Learning）的主要特徵？", "options": {"A": "需重新蒐集大規模標註資料，以確保模型具備穩定表現", "B": "透過少量任務示例，引導模型適應新情境或新分類需求", "C": "不需任何範例輸入，即可完成新任務推論", "D": "僅適用於自然語言處理任務，對其他模態效果有限"}, "topic": "機器學習模型與學習類型"}, {"batch": "115年第一次", "batchCode": "115T1", "subject": "第二科：生成式AI應用與規劃", "subjectCode": "S2", "answer": "C", "number": 31, "id": "115T1-S2-31", "question": "某有機農場累積了十年的病蟲害防治紀錄文件，包含不同作物的病害症狀描述、 防治方法和效果評估。農場主人希望建立一個AI 助手，能根據農民描述的作物症狀，快速提供相關的防治建議和歷史案例。下列哪一種技術最適合解決這個需求？", "options": {"A": "直接使用ChatGPT 的預訓練知識回答農業問題", "B": "將所有文件內容加入ChatGPT 的系統提示詞中", "C": "採用RAG 技術，將農場文件建立向量資料庫，結合大語言模型生成回答", "D": "使用少樣本學習（Few-shot Learning），在提示詞中提供3-5 個病害案例"}, "topic": "生成式AI與LLM應用"}, {"batch": "115年第一次", "batchCode": "115T1", "subject": "第二科：生成式AI應用與規劃", "subjectCode": "S2", "answer": "A", "number": 32, "id": "115T1-S2-32", "question": "隨著企業加速導入AI，No-Code/Low-Code 平台逐漸成為模型開發與產品化的常見工具。相較於傳統自行撰寫程式的建模流程，下列何者最能正確描述此類平台在模型訓練機制上的典型特性？", "options": {"A": "透過視覺化介面與標準化流程，協助完成模型訓練與調校", "B": "主要提供既有模型推論能力，通常不支援重新訓練", "C": "著重資料處理與轉換，模型訓練仍需外部工具完成", "D": "多數僅適用於特定大數據框架（如Spark）的訓練流程"}, "topic": "No-Code／Low-Code與流程自動化"}, {"batch": "115年第一次", "batchCode": "115T1", "subject": "第二科：生成式AI應用與規劃", "subjectCode": "S2", "answer": "A", "number": 33, "id": "115T1-S2-33", "question": "某醫療院所希望改善行政效率，規劃讓各科室人員可自行建立行政回報與內部申請表單，並導入AI 功能以自動判讀與分類填寫內容（如問題類型或需求性質）， 同時需兼顧流程調整彈性與降低系統開發維運負擔。下列哪一種技術組合最適合？", "options": {"A": "Low-Code 平台 × 預訓練語言模型 API", "B": "No-Code 平台 × 規則式自動化（Rule-based Automation）", "C": "傳統程式開發 × 自建深度學習模型", "D": "試算表工具 × 手動資料標記分析"}, "topic": "生成式AI與LLM應用"}, {"batch": "115年第一次", "batchCode": "115T1", "subject": "第二科：生成式AI應用與規劃", "subjectCode": "S2", "answer": "A", "number": 34, "id": "115T1-S2-34", "question": "某企業導入 No-Code/Low-Code 平台開放各部門自行開發應用。半年後發現：出現多個功能相近系統、資料欄位定義不一致，且部分應用未經審核即上線，並伴隨權限與維運管理混亂。下列何者最可能為根本問題？", "options": {"A": "缺乏統一的開發與上線管理機制", "B": "平台提供過高的應用設計自主性", "C": "部門未建立共用的資料分析呈現標準", "D": "系統整合與自動化能力尚未完善"}, "topic": "No-Code／Low-Code與流程自動化"}, {"batch": "115年第一次", "batchCode": "115T1", "subject": "第二科：生成式AI應用與規劃", "subjectCode": "S2", "answer": "B", "number": 35, "id": "115T1-S2-35", "question": "在生成式AI 文字生成模型設計中，Encoder–Decoder 與Decoder-only 為常見架構。下列何者最能正確說明兩者在資訊處理與生成機制上的核心差異？", "options": {"A": "Encoder–Decoder 透過編碼與解碼階段處理序列，Decoder-only 則以單一模型完成處理", "B": "Encoder–Decoder 區分輸入理解與內容生成階段，Decoder-only 以單一模型同時處理上下文與生成", "C": "Decoder-only 架構主要依賴外部知識檢索，Encoder–Decoder 則不需要", "D": "Encoder–Decoder 架構僅適用於翻譯任務，Decoder-only 架構較適合對話任務"}, "topic": "生成式AI與LLM應用"}, {"batch": "115年第一次", "batchCode": "115T1", "subject": "第二科：生成式AI應用與規劃", "subjectCode": "S2", "answer": "C", "number": 36, "id": "115T1-S2-36", "question": "某連鎖零售企業使用生成式AI 協助規劃門市補貨策略。決策時需同時考量多項彼此相關的因素，例如：庫存水位、促銷活動、區域銷售差異與物流限制。專案團隊發現，AI 雖能逐步說明推論過程，但對於多條件之間的相互影響掌握不足，導致建議結果偶有偏差。若希望透過提示工程（Prompt Engineering）改善此問題， 下列哪一種策略最為適合？", "options": {"A": "Chain of Thought，要求模型逐步展開推論", "B": "Tree of Thoughts，增加多種推論路徑探索", "C": "Graph Prompting，以結構化方式呈現條件與關聯", "D": "Zero-shot Prompting，避免範例影響模型判斷"}, "topic": "生成式AI與LLM應用"}, {"batch": "115年第一次", "batchCode": "115T1", "subject": "第二科：生成式AI應用與規劃", "subjectCode": "S2", "answer": "C", "number": 37, "id": "115T1-S2-37", "question": "某電商平台導入生成式AI 客服助理，用於自動回覆顧客詢問。營運需求包含：需即時反映每日更新的促銷活動與商品資訊，同時維持品牌一致的回覆語氣，且企業希望避免因模型重新訓練所造成的成本增加與系統不穩定。在此情境下，下列哪一種技術策略最合理？", "options": {"A": "僅進行Fine-tuning，使模型同時學習品牌語氣與即時促銷內容", "B": "僅導入RAG 更新促銷資訊，期望模型直接從檢索內容學習品牌語氣", "C": "透過Prompt Engineering 控制回覆風格，並以RAG 引入最新商品與活動資訊", "D": "持續進行增量Fine-tuning，以確保活動資訊同步更新"}, "topic": "生成式AI與LLM應用"}, {"batch": "115年第一次", "batchCode": "115T1", "subject": "第二科：生成式AI應用與規劃", "subjectCode": "S2", "answer": "C", "number": 38, "id": "115T1-S2-38", "question": "某企業規劃導入生成式AI 助理，在正式全面部署前進行概念驗證（PoC），下列何者最不適合作為此階段的主要工作？", "options": {"A": "驗證模型在實際使用情境下的回覆品質與穩定性", "B": "測試AI 功能與業務需求的匹配程度", "C": "制定跨部門使用規範，與長期治理框架", "D": "評估系統整合可行性與技術限制"}, "topic": "AI治理、法規與倫理"}, {"batch": "115年第一次", "batchCode": "115T1", "subject": "第二科：生成式AI應用與規劃", "subjectCode": "S2", "answer": "D", "number": 39, "id": "115T1-S2-39", "question": "某企業規劃導入生成式 AI 客服系統，需處理顧客查詢並引用歷史交易資料。法遵部門在風險評估中指出，系統若不當處理顧客個人資料，可能引發合規與法律責任。若專案初期希望從資料層面降低敏感資訊暴露風險，下列敘述何者最為合理？", "options": {"A": "強化模型輸出審查與遮罩機制，以過濾可能出現的敏感資訊", "B": "設定AI 回覆範圍與角色權限，限制其存取特定類型資料", "C": "將資料集中於加密儲存環境，並加強系統存取控管", "D": "僅提供必要資料或數據欄位與去識別化策略，減少模型接觸可識別個資"}, "topic": "AI治理、法規與倫理"}, {"batch": "115年第一次", "batchCode": "115T1", "subject": "第二科：生成式AI應用與規劃", "subjectCode": "S2", "answer": "B", "number": 40, "id": "115T1-S2-40", "question": "某企業導入大型語言模型（LLM）進行客服自動化，並已透過Fine-Tuning 學習企業標準問答範例，但在實務運作中仍出現回應策略未符合服務優先順序及語氣與品牌風格不一致的情況，因此技術團隊建議再導入Reinforcement Fine-tuning （RFT）機制進行優化，其主要目的為何？", "options": {"A": "擴展模型的知識涵蓋範圍與資料記憶能力", "B": "透過reward 訊號調整模型回應策略與行為偏好", "C": "提升模型推論速度與降低回應延遲", "D": "降低prompt 設計複雜度並取代訓練流程"}, "topic": "生成式AI與LLM應用"}, {"batch": "115年第一次", "batchCode": "115T1", "subject": "第二科：生成式AI應用與規劃", "subjectCode": "S2", "answer": "A", "number": 41, "id": "115T1-S2-41", "question": "企業在評估AI 決策模型是否存在資料分布偏差時，下列何者最屬於偏見檢測 （Bias Detection）而非偏見緩解（Bias Mitigation）措施？", "options": {"A": "比較不同資料分布的模型預測結果分布與錯誤率", "B": "重新加權訓練樣本以平衡資料分布代表性", "C": "在推論階段加入輸出過濾規則", "D": "調整模型決策閾值（Decision Threshold）以降低預測差異"}, "topic": "AI治理、法規與倫理"}, {"batch": "115年第一次", "batchCode": "115T1", "subject": "第二科：生成式AI應用與規劃", "subjectCode": "S2", "answer": "B", "number": 42, "id": "115T1-S2-42", "question": "某企業希望利用含敏感資訊的資料進行AI 模型訓練，但政策要求原始資料不得外洩，且資料可集中於安全環境中處理。同時，企業希望在資料使用過程中，即使資料處於加密狀態，仍能完成模型計算。在此需求下，下列哪一種技術最為適合？", "options": {"A": "聯邦學習（Federated Learning）", "B": "同態加密（Homomorphic Encryption）", "C": "零知識證明（Zero-knowledge Proof）", "D": "資料匿名化（Data Anonymization）"}, "topic": "機器學習模型與學習類型"}, {"batch": "115年第一次", "batchCode": "115T1", "subject": "第二科：生成式AI應用與規劃", "subjectCode": "S2", "answer": "B", "number": 43, "id": "115T1-S2-43", "question": "某金融服務公司規劃導入生成式AI，在評估模型部署方式時，基於內部控制與治理要求，企業考慮將大型語言模型建置於公司可管理環境，而非直接採用外部雲端服務。下列何者最能合理說明此部署決策的潛在優勢？", "options": {"A": "有助提升模型回覆穩定性並降低隨機性影響", "B": "可降低敏感資料需傳輸至外部服務的風險", "C": "可直接減少模型訓練與維運所需資源投入", "D": "可避免模型輸出偏差與幻覺（Hallucination）問題"}, "topic": "AI治理、法規與倫理"}, {"batch": "115年第一次", "batchCode": "115T1", "subject": "第二科：生成式AI應用與規劃", "subjectCode": "S2", "answer": "B", "number": 44, "id": "115T1-S2-44", "question": "某智慧製造廠導入語音互動AI 助理，作業人員可透過語音查詢設備狀態與操作指引。系統流程包含語音轉文字、語言模型生成回覆，以及即時查詢內部系統資料。測試結果顯示：語音轉文字在專業設備術語上錯誤率偏高；語言模型回覆偶有內容不夠精準；系統整體回應速度略慢但仍在可接受範圍。若專案目標為優先確保正確執行指令，下列改進措施的執行順序何者最合理？", "options": {"A": "優化語言模型 → 強化語音模型 → 優化系統效能 → 調整生成參數", "B": "強化語音模型 → 優化語言模型與知識補充 → 調整生成參數 → 優化系統效能", "C": "優化系統效能 → 強化語音模型 → 優化語言模型與知識補充 → 調整生成參數", "D": "強化語音模型 → 優化系統效能 → 優化語言模型與知識補充 → 調整生成參數"}, "topic": "生成式AI與LLM應用"}, {"batch": "115年第一次", "batchCode": "115T1", "subject": "第二科：生成式AI應用與規劃", "subjectCode": "S2", "answer": "D", "number": 45, "id": "115T1-S2-45", "question": "某企業導入生成式AI 助理，協助內部人員撰寫專案建議與分析報告。團隊希望透過思維鏈（Chain of Thought, CoT）提示設計提升模型輸出的邏輯性與推理透明度，下列何者最符合該提示策略？", "options": {"A": "「請直接給出最終建議，不需顯示分析過程。」", "B": "「以下提供兩份分析報告範例，請依相同格式產出新報告。」", "C": "「請將任務拆為三個步驟：資料整理 → 重點摘要 → 建議產出。」", "D": "「請逐步說明你的判斷依據與推理過程，最後再給出結論。」"}, "topic": "生成式AI與LLM應用"}, {"batch": "115年第一次", "batchCode": "115T1", "subject": "第二科：生成式AI應用與規劃", "subjectCode": "S2", "answer": "C", "number": 46, "id": "115T1-S2-46", "question": "某金融監理機構規劃導入生成式AI 以協助內部人員分析申報文件與監理報告，系統需處理大量涉及企業敏感資料與未公開資訊。主管機關明確要求「資料安全與法規遵循必須優先於導入速度與成本考量」。在此條件下，下列哪一種策略最為適當？", "options": {"A": "採用雲端大型語言模型 API，並透過資料遮罩與加密機制降低外洩風險", "B": "導入開源模型進行私有化部署，以兼顧成本彈性與模型可控性", "C": "自行訓練並私有化部署模型，同時建立存取控管與稽核機制", "D": "先驗證模型效益，再逐步補強合規與資安架構"}, "topic": "AI治理、法規與倫理"}, {"batch": "115年第一次", "batchCode": "115T1", "subject": "第二科：生成式AI應用與規劃", "subjectCode": "S2", "answer": "A", "number": 47, "id": "115T1-S2-47", "question": "某製造企業規劃導入生成式AI 協助產線異常紀錄分析，系統將根據設備回報與維修紀錄自動產出問題摘要與建議處置說明。在試行測試階段，為降低營運與決策風險，下列何者最應優先驗證？", "options": {"A": "AI 生成建議與實際工程判斷的一致性與正確性", "B": "系統在高資料量輸入下的處理速度與延遲表現", "C": "模型對不同設備品牌資料格式的轉換能力", "D": "異常分析報告的視覺化呈現與介面易讀性"}, "topic": "生成式AI與LLM應用"}, {"batch": "115年第一次", "batchCode": "115T1", "subject": "第二科：生成式AI應用與規劃", "subjectCode": "S2", "answer": "C", "number": 48, "id": "115T1-S2-48", "question": "某企業將機器學習模型部署於線上推薦系統。模型在測試階段表現良好，但上線數月後，點擊率與預測準確度逐漸下降。經分析發現，近期使用者行為模式與模型訓練期間的資料特徵出現顯著變化。此現象最可能屬於下列何者？", "options": {"A": "模型過度擬合訓練資料，無法泛化至未知樣本", "B": "特徵工程設計不佳，導致輸入資訊不足", "C": "資料統計特徵隨時間改變，影響模型推論效果", "D": "系統資料結構調整，造成特徵欄位錯置"}, "topic": "機器學習模型與學習類型"}, {"batch": "115年第一次", "batchCode": "115T1", "subject": "第二科：生成式AI應用與規劃", "subjectCode": "S2", "answer": "B", "number": 49, "id": "115T1-S2-49", "question": "某企業使用Low-Code 平台建置內部營運系統，系統需整合財務、庫存與第三方物流服務。團隊希望確保系統在跨部門流程與外部服務整合下，具高可靠性與可測試性。下列哪一項作法最能達成目標？", "options": {"A": "只透過平台提供的流程模擬與即時預覽，檢查常用操作路徑", "B": "建立自動化測試流程，結合模擬外部服務與可重複執行的整合測試", "C": "將測試重點放在使用者介面操作，確認操作流程是否順暢", "D": "上線後再透過使用者回饋與報表監控系統行為，進行修正"}, "topic": "No-Code／Low-Code與流程自動化"}, {"batch": "115年第一次", "batchCode": "115T1", "subject": "第二科：生成式AI應用與規劃", "subjectCode": "S2", "answer": "C", "number": 50, "id": "115T1-S2-50", "question": "某招聘公司使用生成式AI 生成面試問題與候選人評估建議。團隊發現模型可能對性別或年齡產生的資料分布偏差。下列哪一種策略最能有效降低生成偏差輸出的風險？", "options": {"A": "調整模型架構與參數，使生成更靈活與多樣化", "B": "大幅增加訓練資料量，但不清理或平衡資料中的性別與年齡分布", "C": "在生成後對模型輸出進行人工審查，並依偏差情況修正結果", "D": "僅允許高階主管操作系統，透過人員篩選控制生成結果"}, "topic": "生成式AI與LLM應用"}, {"batch": "115年第二次", "batchCode": "115T2", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "A", "number": 1, "id": "115T2-S1-01", "question": "某地方政府委託資料科學團隊，針對選舉期間的社群媒體貼文進行大規模輿情分析，目標是了解選民對各政策議題的態度傾向。團隊規劃整合多種AI 技術以提升分析涵蓋率。下列哪一種技術組合最符合上述需求，且不涉及對特定個人的身份辨識？", "options": {"A": "情感分析結合關鍵詞提取，分析貼文內容的立場與高頻議題詞彙", "B": "文本分類結合人臉辨識，辨識發文者身份後再進行政治立場分類", "C": "語音辨識結合影像辨識，將選舉造勢影片轉換為可分析的文字資料，並進行內容整理與主題歸納", "D": "推薦系統結合社群圖譜分析，針對個別使用者預測其投票選擇"}, "topic": "AI應用情境與基本概念"}, {"batch": "115年第二次", "batchCode": "115T2", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "D", "number": 2, "id": "115T2-S1-02", "question": "某物流公司正在規劃導入AI 系統以優化多項業務流程，包含異常包裹偵測、路線自動規劃與倉儲揀貨效率提升。技術團隊在評估過程中，針對不同任務的資料特性與學習目標，討論應採用哪種機器學習方式。請問下列對於各學習方式的敘述，何者有誤？", "options": {"A": "監督式學習（Supervised Learning）適合用於異常包裹偵測，前提是須備有大量已標註為正常或異常的歷史資料", "B": "非監督式學習可（Unsupervised Learning）用於分析倉儲揀貨動線的潛在分群，但無法直接預測特定行為的對錯", "C": "強化學習（Reinforcement Learning）適合應用於路線規劃，模型透過反覆嘗試與環境回饋，逐步找出最佳配送策略", "D": "非監督式學習（Unsupervised Learning）可用於異常包裹偵測，並能在缺乏標註資料的情況下，準確判斷每筆資料是否屬於特定異常類別"}, "topic": "機器學習模型與學習類型"}, {"batch": "115年第二次", "batchCode": "115T2", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "A", "number": 3, "id": "115T2-S1-03", "question": "某電子製造公司在產線上導入AI 系統，自動判斷電路板是否存在焊接瑕疵，並取代人工目視檢查。該系統需處理大量產品外觀影像，並在高產量環境下短時間內完成品質判定。下列何者最不符合此應用所展現的AI 核心技術能力？", "options": {"A": "自然語言處理（Natural Language Processing）", "B": "電腦視覺（Computer Vision）", "C": "異常偵測（Anomaly Detection）", "D": "診斷性分析（Diagnostic Analytics）"}, "topic": "資料分析、視覺化與評估指標"}, {"batch": "115年第二次", "batchCode": "115T2", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "B", "number": 4, "id": "115T2-S1-04", "question": "某金融科技公司的交易系統，在毫秒等級的時間內持續掃描跨市場價格差異、 分析大量即時報價，並自動執行交易指令。系統架構師在技術選用評估時，需確認該系統於即時交易決策中最核心依賴的AI 能力。下列何者最能正確說明其核心AI 能力？", "options": {"A": "透過自然語言處理技術分析財經新聞語意，作為輔助性市場情緒指標", "B": "快速分析龐大市場數據並在極短時間內識別交易機會，驅動自動化交易決策", "C": "運用生成對抗網路模擬極端市場情境，預先產出各類黑天鵝事件的應對策略", "D": "透過推薦系統技術，根據投資人歷史交易行為推薦最適合的投資組合標的"}, "topic": "AI應用情境與基本概念"}, {"batch": "115年第二次", "batchCode": "115T2", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "C", "number": 5, "id": "115T2-S1-05", "question": "某地方政府導入AI 系統審核低收入補助資格。系統已通過內部測試且準確率高，但民間團體指出不同族群核准率差異顯著。政府表示該系統由專業廠商開發，且未接獲大量申訴。依《人工智慧基本法》精神，下列何者為最適當之優先作法？", "options": {"A": "要求廠商提出無歧視聲明，並持續觀察", "B": "提升模型整體準確率，以降低錯誤影響", "C": "進行偏誤影響評估並建立可解釋與申訴機制", "D": "因尚無大量申訴，暫不調整現行制度"}, "topic": "AI治理、法規與倫理"}, {"batch": "115年第二次", "batchCode": "115T2", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "C", "number": 6, "id": "115T2-S1-06", "question": "某AI 新創公司申請AI 系統認證，並聲稱其產品已通過我國「AI 產品與系統評測中心」之生成式AI 評測。下列何者不屬於該中心之評測項目？", "options": {"A": "資安（Secure）", "B": "公平性（Fair）", "C": "效率性（Efficiency）", "D": "可靠性（Reliability）"}, "topic": "AI治理、法規與倫理"}, {"batch": "115年第二次", "batchCode": "115T2", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "A", "number": 7, "id": "115T2-S1-07", "question": "某媒體集團計畫自行訓練一套生成式AI 系統，用於自動產出新聞摘要與評論內容。在專案啟動會議中，法務與技術團隊共同討論如何從訓練階段就降低模型產出有害或偏頗內容的風險，並兼顧內容的多元性與公平性。請問下列哪一項措施最應該在模型訓練階段優先落實？", "options": {"A": "確保訓練資料來源多元，並經過嚴格的內容清洗與偏見過濾，以減少模型學習到有害或偏頗資訊的風險", "B": "完全避免使用任何外部文本資料，以降低模型學習到不當內容的可能性", "C": "僅使用公司內部的新聞稿與公告進行訓練，確保資料來源可控且符合企業立場", "D": "限制模型僅能產出固定格式的內容，從輸出端約束模型避免生成不當資訊"}, "topic": "AI治理、法規與倫理"}, {"batch": "115年第二次", "batchCode": "115T2", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "A", "number": 8, "id": "115T2-S1-08", "question": "某保險公司規劃推出一套AI 核保輔助系統，針對線上投保申請進行初步風險評估並自動回覆審核結果。系統開發完成後，依據金融機構運用人工智慧技術作業規範，系統在正式與消費者互動前，必須確認相關揭露義務已落實。請問下列何者不屬於該規範要求金融機構必要揭露的事項？", "options": {"A": "詳細公開本系統所採用的機器學習模型架構與完整訓練資料內容", "B": "說明本服務的適用對象與用途範圍，使消費者了解系統的使用限制與服務邊界", "C": "說明當消費者對AI 核保結果有異議時，是否提供人工複核或申訴管道", "D": "告知消費者本次核保審查結果係由AI 系統自動完成，非人工逐案審核"}, "topic": "AI治理、法規與倫理"}, {"batch": "115年第二次", "batchCode": "115T2", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "D", "number": 9, "id": "115T2-S1-09", "question": "某大型醫院導入AI 輔助診斷系統，用於分析病患的電子病歷與影像資料並提供疾病風險評分。系統上線後，院方陸續收到三類回饋：①放射科醫師反映無法理解系統判斷某病患為高風險的依據與理由；②數位治理委員會發現系統對特定族裔病患的誤診率顯著偏高；③資訊安全部門指出部分病患個資在未告知當事人的情況下被納入模型再訓練。依據AI 倫理五大核心原則，上述三類問題分別對應哪一項原則的違反？", "options": {"A": "①違反安全性、②違反問責性、③違反透明性", "B": "①違反隱私性、②違反安全性、③違反公平性", "C": "①違反公平性、②違反透明性、③違反問責性", "D": "①違反透明性、②違反公平性、③違反隱私性"}, "topic": "AI治理、法規與倫理"}, {"batch": "115年第二次", "batchCode": "115T2", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "A", "number": 10, "id": "115T2-S1-10", "question": "某市政府環保局計畫建立空氣品質監測AI 系統，需整合全市5 萬個感測器的即時數據（每秒產生大量資料記錄），並持續接收氣象、交通與工廠排放等資料， 且需即時處理持續產生的資料。就大數據特性分析，下列何者最能說明此專案面臨的主要挑戰組合？", "options": {"A": "Volume 與Velocity，因為資料量龐大且持續高速產生", "B": "Variety 與Veracity，因為資料來源多元且需確保正確性", "C": "Velocity 與Value，因為需即時判斷資料是否具有分析價值", "D": "Volume 與Value，因為需從大量資料中篩選出有用資訊"}, "topic": "AI應用情境與基本概念"}, {"batch": "115年第二次", "batchCode": "115T2", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "C", "number": 11, "id": "115T2-S1-11", "question": "某保險公司建立理賠風險預測模型時，資料科學家在特徵選擇階段提出以「性別」作為預測愛滋病毒感染風險的輸入特徵之一。資料治理委員會在審查特徵清單時，對此提出異議。下列哪一項理由最能說明「以性別預測愛滋病毒感染風險」是不適當的原因？", "options": {"A": "性別為類別型變數，需進行編碼轉換才能輸入模型，增加前處理複雜度", "B": "性別特徵在資料集中可能存在缺失值，影響模型訓練的穩定性", "C": "以性別作為感染風險的代理特徵，會強化對特定族群的歧視性標籤，違反公平性原則", "D": "性別特徵與感染風險之間的統計相關性有限，可能降低模型預測效能"}, "topic": "AI治理、法規與倫理"}, {"batch": "115年第二次", "batchCode": "115T2", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "B", "number": 12, "id": "115T2-S1-12", "question": "某製造業導入AI 進行生產排程，需整合ERP（企業資源規劃系統）訂單資料、 設備感測器產生的連續數值紀錄，以及維修技師手寫異常描述（掃描為PDF）。 資料治理主管需判斷三類資料的型態。下列何者最能正確對應其資料型態？", "options": {"A": "ERP 訂單資料為半結構化、感測器數值為結構化、維修文字描述為非結構化", "B": "ERP 訂單資料為結構化、感測器數值為結構化、維修文字描述為非結構化", "C": "ERP 訂單資料為結構化、感測器數值為非結構化、維修文字描述為半結構化", "D": "三者皆屬結構化資料，因為都可以轉換為數值格式後進行分析"}, "topic": "AI治理、法規與倫理"}, {"batch": "115年第二次", "batchCode": "115T2", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "D", "number": 13, "id": "115T2-S1-13", "question": "某銀行建立機器學習模型預測客戶的貸款違約風險。資料集中有一個「職業類別」欄位，包含「工程師、教師、業務、自由業」等類別。工程師計劃將此欄位進行編碼處理後直接輸入線性模型。下列哪一種編碼方式最可能導致模型錯誤解讀類別之間的關係？", "options": {"A": "One-Hot Encoding", "B": "Binary Encoding", "C": "Target Encoding", "D": "Label Encoding"}, "topic": "資料處理、特徵工程與資料品質"}, {"batch": "115年第二次", "batchCode": "115T2", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "B", "number": 14, "id": "115T2-S1-14", "question": "某能源公司以過去三年每小時用電資料建立需求預測模型，並以5-fold 交叉驗證評估，但上線後誤差偏高。技術主管認為問題出在資料分割方式。下列何者最能說明使用標準k-fold 交叉驗證的根本問題？", "options": {"A": "k-fold 交叉驗證需要的計算資源過大，不適合處理三年以上的長期資料", "B": "k-fold 交叉驗證會隨機分割資料，使訓練集中可能包含比測試集更晚的時間點，破壞時間依賴性", "C": "k-fold 交叉驗證的折數設定過少，應改為10-fold 以提升驗證穩定性", "D": "k-fold 交叉驗證僅適用於分類問題，不適合電力需求這類連續數值預測任務"}, "topic": "機器學習模型與學習類型"}, {"batch": "115年第二次", "batchCode": "115T2", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "D", "number": 15, "id": "115T2-S1-15", "question": "某醫療院所建置病患再住院風險預測模型，特徵包含「年齡」、「體重」、「血壓數值」及「診斷類別代碼」等，資料科學家考慮是否需對數值特徵進行標準化 （Standardization）處理。下列何種模型對特徵尺度最不敏感、最適合在不進行標準化的情況下直接使用上述特徵進行訓練？", "options": {"A": "線性迴歸（Linear Regression）", "B": "支援向量機（Support Vector Machine）", "C": "K 近鄰演算法（K-Nearest Neighbors）", "D": "決策樹（Decision Tree）"}, "topic": "機器學習模型與學習類型"}, {"batch": "115年第二次", "batchCode": "115T2", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "D", "number": 16, "id": "115T2-S1-16", "question": "某企業集團在多個領域導入AI 技術，應用於不同業務場景。請問下列哪一項最符合異常檢測（Anomaly Detection）的主要應用目標？", "options": {"A": "分析客戶的消費行為資料，將客群依偏好進行分群，以制定差異化行銷策略", "B": "根據歷史交易與客戶資料，建立模型預測未來可能發生違約的客戶", "C": "彙整企業各部門的營運數據，建立儀表板供管理層追蹤關鍵績效指標 （KPI）的變化", "D": "從設備感測資料中，即時偵測出與正常運作模式顯著偏離的訊號，以預警可能發生的故障"}, "topic": "No-Code／Low-Code與流程自動化"}, {"batch": "115年第二次", "batchCode": "115T2", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "D", "number": 17, "id": "115T2-S1-17", "question": "某交通局計劃將公車乘客刷卡資料提供給學術機構進行通勤模式研究，該資料包含卡號、上下車時間、路線編號等欄位，且需保留跨時間追蹤同一乘客行為能力。為保護乘客隱私，下列哪種處理方式最符合個人資料保護法的去識別化要求？", "options": {"A": "將卡號欄位全部刪除，僅保留上下車時間與路線編號", "B": "對卡號進行MD5 雜湊處理，並保留對照表供查詢", "C": "將資料彙總為每日各路線總乘客數統計", "D": "將卡號替換為隨機編號，且不保留任何對應關係"}, "topic": "AI治理、法規與倫理"}, {"batch": "115年第二次", "batchCode": "115T2", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "B", "number": 18, "id": "115T2-S1-18", "question": "某工業感測器回傳溫度時序資料，約5%出現遺漏值，確認為短暫失聯所致，非設備異常。資料工程師需在不引入虛假異常的前提下進行補值。考量資料具時間連續性，下列何種填補方式最為合適？", "options": {"A": "將遺漏值全數填補為0", "B": "以前後時間點的觀測值進行線性插補", "C": "填補整份資料的平均值", "D": "直接刪除包含遺漏值的時間點"}, "topic": "AI應用情境與基本概念"}, {"batch": "115年第二次", "batchCode": "115T2", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "A", "number": 19, "id": "115T2-S1-19", "question": "某溫室農場開發AI 系統自動識別作物葉片上的害蟲種類，測試結果顯示：在 1000 張測試影像中，系統正確識別出80 隻害蟲，但誤判了20 張正常葉片為有害蟲，同時漏檢了10 隻實際存在的害蟲。對於害蟲檢測這個關鍵任務，下列哪個評估指標最需要優先關注？", "options": {"A": "召回率（Recall）", "B": "精確率（Precision）", "C": "準確率（Accuracy）", "D": "F1 分數（F1-Score）"}, "topic": "資料分析、視覺化與評估指標"}, {"batch": "115年第二次", "batchCode": "115T2", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "B", "number": 20, "id": "115T2-S1-20", "question": "某跨國企業需透過網路將各國子公司之敏感資料傳輸至總部進行模型訓練。資訊安全主管要求在傳輸過程中防範中間人攻擊，避免資料遭竊取或竄改。在不影響系統跨國即時傳輸效率之前提下，下列哪一項措施最能有效降低此風險？", "options": {"A": "在接收端加強存取權限與身分驗證，限制只有授權人員可讀取資料", "B": "在資料傳輸過程中進行加密，並確認雙方身分以確保通訊安全", "C": "將資料拆分為多個部分分批傳送，降低單次資料外洩風險", "D": "改用離線備援方式進行跨國資料交換，以降低網路攻擊風險"}, "topic": "機器學習模型與學習類型"}, {"batch": "115年第二次", "batchCode": "115T2", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "C", "number": 21, "id": "115T2-S1-21", "question": "關於深度學習（Deep Learning），下列敘述何者最為正確？", "options": {"A": "深度學習模型通常需要人工設計特徵，以提升模型表現", "B": "深度學習主要應用於資料壓縮與特徵轉換，較少用於預測任務", "C": "深度學習透過多層神經網路，能自動從大量資料中學習抽象特徵", "D": "深度學習模型通常不需要大量資料即可達到良好效果，適合資料量有限的情境"}, "topic": "機器學習模型與學習類型"}, {"batch": "115年第二次", "batchCode": "115T2", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "D", "number": 22, "id": "115T2-S1-22", "question": "某企業於不同業務場景導入AI 應用。下列關於其應用情境與機器學習類型的敘述，何者正確？", "options": {"A": "客服對話分析中，同時使用少量標註資料與大量未標註資料進行訓練，屬於監督式學習（Supervised Learning）", "B": "商品分類系統依據顧客購買行為自動將商品分群，且未使用任何標註資料， 屬於監督式學習（Supervised Learning）", "C": "自動駕駛系統根據操作結果的回饋持續調整決策策略，屬於非監督式學習 （Unsupervised Learning）", "D": "使用者行為分析中，依據瀏覽與點擊模式將使用者分群，且未使用標註資料，屬於非監督式學習（Unsupervised Learning）"}, "topic": "機器學習模型與學習類型"}, {"batch": "115年第二次", "batchCode": "115T2", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "A", "number": 23, "id": "115T2-S1-23", "question": "某房仲業者委託AI 團隊開發一套房價預測系統，希望根據物件坪數、屋齡、樓層與地段等條件，自動估算每間房屋的成交價格，供業務人員作為議價參考依據。下列哪一種指標最適合在系統上線前評估模型的預測準確程度？", "options": {"A": "均方誤差（MSE）", "B": "精確率（Precision）", "C": "F1 分數（F1 Score）", "D": "召回率（Recall）"}, "topic": "資料分析、視覺化與評估指標"}, {"batch": "115年第二次", "batchCode": "115T2", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "A", "number": 24, "id": "115T2-S1-24", "question": "某電商平台導入強化學習（Reinforcement Learning）技術優化商品推薦策略，AI 代理（AI Agent）會根據使用者的點擊與購買行為持續調整推薦內容。技術團隊在討論中發現，系統面臨一個核心挑戰：若AI Agent 總是推薦過去表現良好的商品，可能會錯失發掘更高潛力商品的機會；但若頻繁嘗試未知商品，又可能影響短期的推薦成效與使用者體驗。請問上述情境敘述的是強化學習中哪一個核心問題？", "options": {"A": "探索與利用的權衡（Exploration vs. Exploitation）", "B": "偏差與變異的權衡（Bias vs. Variance）", "C": "梯度爆炸與消失（Vanishing and Exploding Gradients）", "D": "過擬合與欠擬合（Overfitting and Underfitting）"}, "topic": "生成式AI與LLM應用"}, {"batch": "115年第二次", "batchCode": "115T2", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "A", "number": 25, "id": "115T2-S1-25", "question": "某語音辨識系統需分析長時間的語音序列，發現當句子較長時，模型難以保留長時間序列中的前段資訊，導致辨識準確度下降。為改善此問題，下列何種模型最適合？", "options": {"A": "長短期記憶網路（LSTM）", "B": "循環神經網路（RNN）", "C": "卷積神經網路（CNN）", "D": "生成式對抗網路（GAN）"}, "topic": "生成式AI與LLM應用"}, {"batch": "115年第二次", "batchCode": "115T2", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "B", "number": 26, "id": "115T2-S1-26", "question": "某大型連鎖超市建置生鮮商品損耗預測模型，以減少報廢損失。資料庫中共有 120 萬筆銷售紀錄，但僅有約8 萬筆資料標記為「正常銷售」或「損耗發生」， 其餘資料均未標註。在標註資源有限的情況下，團隊希望提升模型預測表現。 請問下列哪一種機器學習方式最適合此情境？", "options": {"A": "監督式學習（Supervised Learning），以8 萬筆已標註資料訓練分類模型，捨棄其餘112 萬筆無標註資料", "B": "半監督式學習（Semi-supervised Learning），同時利用少量已標註資料學習分類邊界，並從大量無標註資料中學習資料整體分布特性", "C": "非監督式學習（Unsupervised Learning），對全部120 萬筆資料進行自動分群，再由專家事後人工確認各群所代表的損耗類型", "D": "強化學習（Reinforcement Learning），讓模型在每次預測後依據實際損耗結果作為回饋訊號，持續調整損耗預警策略"}, "topic": "機器學習模型與學習類型"}, {"batch": "115年第二次", "batchCode": "115T2", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "A", "number": 27, "id": "115T2-S1-27", "question": "某製造業評估在不同場景導入AI，包含： （甲）依據設備感測器數值判斷是否出現異常； （乙）依據客服對話內容判斷客戶情緒； （丙）依據產品影像輪廓直接進行瑕疵分類。 下列哪一種情境最適合以自編碼器（Autoencoder）作為主要模型架構？", "options": {"A": "甲", "B": "乙", "C": "丙", "D": "甲與丙"}, "topic": "機器學習模型與學習類型"}, {"batch": "115年第二次", "batchCode": "115T2", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "D", "number": 28, "id": "115T2-S1-28", "question": "某AI 團隊正在訓練一個深度神經網路，用於辨識工廠產線上的瑕疵零件。工程師發現訓練過程中損失函數震盪幅度大，且不同批次資料造成模型學習方向不穩定。為改善此問題，團隊在各隱藏層加入Batch Normalization 機制。請問此調整在訓練階段最主要的作用為何？", "options": {"A": "將輸入影像標準化，使不同類別的特徵分布更加一致", "B": "自動調整模型權重初始化方式，以避免訓練初期震盪", "C": "增加模型隱藏層的非線性能力，以提升分類精度上限", "D": "降低不同批次輸入造成的內部特徵分布變動，使梯度更新更穩定"}, "topic": "機器學習模型與學習類型"}, {"batch": "115年第二次", "batchCode": "115T2", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "C", "number": 29, "id": "115T2-S1-29", "question": "某AI 研究團隊採用GRPO（Group Relative Policy Optimization）作為一種基於強化學習的模型優化方法，用於提升大型語言模型的表現。請問GRPO 最適合用來強化模型在哪一類任務上的表現？", "options": {"A": "判斷客服留言的情緒傾向，將每則訊息快速歸類為正面、負面或中性", "B": "將客服電話錄音即時轉換為文字，供後續人工審閱使用", "C": "針對數學應用題或邏輯謎題，逐步推導出正確解答", "D": "分析商品圖片的外觀特徵，自動辨識類別與品項"}, "topic": "生成式AI與LLM應用"}, {"batch": "115年第二次", "batchCode": "115T2", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "B", "number": 30, "id": "115T2-S1-30", "question": "某法律科技公司開發一套合約風險審查系統，可自動分析合約內容並標示潛在的高風險條款。律師在使用過程中，希望了解模型做出風險判斷的依據，因此系統導入顯著性圖（Saliency Map）作為可解釋 AI 的方法。請問在此自然語言處理（Natural Language Processing, NLP）應用情境中，顯著性圖主要用來標示什麼？", "options": {"A": "合約中各段落之間的語意相似程度，協助辨識重複或可能矛盾的條款", "B": "模型在進行預測時，輸入文字中對結果影響程度較高的文字片段", "C": "不同版本合約之間的文字差異，用以標示新增或修改的條款位置", "D": "模型在訓練資料中學習到的高頻詞彙，反映常見的風險相關用語"}, "topic": "AI治理、法規與倫理"}, {"batch": "115年第二次", "batchCode": "115T2", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "D", "number": 31, "id": "115T2-S1-31", "question": "某製造業AI 品質預測模型採用部分依賴圖（Partial Dependence Plots, PDP）分析特徵影響效果。資料科學家希望了解「溫度特徵」對良品率的整體影響趨勢，但主管進一步詢問，是否能用PDP 判斷某一筆瑕疵產品批次資料中，溫度是否為主要原因。下列何者最能說明PDP 在此情境中的限制？", "options": {"A": "PDP 無法顯示模型的預測準確率", "B": "PDP 僅能反映模型輸出結果，無法提供任何特徵影響的資訊", "C": "PDP 僅能用於單一特徵分析，無法同時考慮多個特徵的影響", "D": "PDP 僅呈現整體趨勢，無法判斷單一批次的原因"}, "topic": "資料處理、特徵工程與資料品質"}, {"batch": "115年第二次", "batchCode": "115T2", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "D", "number": 32, "id": "115T2-S1-32", "question": "某銀行使用LIME（Local Interpretable Model-agnostic Explanations）來解釋其信貸審核模型的決策結果。分析師在閱讀解釋報告時，看到系統建立了一個簡化模型來近似原模型在該筆資料附近的行為。下列何者最能說明LIME 中代理模型（Surrogate model）的意義？", "options": {"A": "一個全局解釋所有預測的線性代理模型", "B": "用於產生擾動資料的資料生成機制", "C": "一種獨立訓練的生成式模型，用於輔助預測", "D": "用於擬合原黑箱模型在目標實例附近的預測行為"}, "topic": "AI治理、法規與倫理"}, {"batch": "115年第二次", "batchCode": "115T2", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "B", "number": 33, "id": "115T2-S1-33", "question": "小明在2025 年使用AI 模型，將自己的照片轉換為公仔風格影像。該模型在維持生成品質的同時，也能在模型規模較大的情況下兼顧運算效率。下列何者最能敘述此模型可能採用的設計方式？", "options": {"A": "基於單一稠密Transformer 架構，每次運算都使用全部模型參數", "B": "採用稀疏專家混合（Sparse Mixture-of-Experts）架構，每次僅使用部分模型來提升效率", "C": "採用生成對抗網路（GAN），透過兩個模型互相比較來提升影像品質", "D": "採用卷積神經網路（CNN），直接進行影像轉換"}, "topic": "生成式AI與LLM應用"}, {"batch": "115年第二次", "batchCode": "115T2", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "C", "number": 34, "id": "115T2-S1-34", "question": "CLIP 與DINO 皆屬於自監督學習（Self-supervised Learning）模型，但其訓練資料來源有所不同。下列何者最能正確敘述兩者在訓練資料型態上的差異？", "options": {"A": "皆使用有標註圖像資料進行監督式學習", "B": "皆使用未標註圖像資料進行自監督學習", "C": "CLIP 使用圖像與文字配對資料，DINO 使用未標註圖像資料", "D": "CLIP 使用未標註圖像資料，DINO 使用圖像與文字配對資料"}, "topic": "機器學習模型與學習類型"}, {"batch": "115年第二次", "batchCode": "115T2", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "A", "number": 35, "id": "115T2-S1-35", "question": "某企業導入大型語言模型（LLM）進行長篇法規文件的問答查詢。使用者反映，當問題需整合文件中較不相關的資訊時，模型回答的連貫性與準確性明顯下降。技術團隊認為此現象與模型架構特性有關。下列何者最能說明傳統 Transformer 在此情境下的限制？", "options": {"A": "模型在推理時僅能依賴固定長度的上下文窗口，無法同時處理分散於全文的資訊", "B": "模型能記住的內容取決於訓練語料，推理時遇到新內容可能無法應對", "C": "Transformer 在長序列處理時效率下降，但仍可完整處理所有輸入內容", "D": "每次推理後 Transformer 都需重新訓練才能記住新的資訊"}, "topic": "AI治理、法規與倫理"}, {"batch": "115年第二次", "batchCode": "115T2", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "A", "number": 36, "id": "115T2-S1-36", "question": "小明剛加入一間電商公司擔任 AI 專案的業務窗口，在與技術團隊的交接會議中，工程師說明模型訓練時，會持續比對預測值與實際值之間的差距，並透過一套機制逐步調整模型內部參數，直到預測結果趨於穩定為止。請問工程師敘述的是深度學習中哪個元件的功能？", "options": {"A": "優化器（Optimizer）", "B": "資料前處理模組", "C": "模型架構", "D": "激活函數（Activation Function）"}, "topic": "機器學習模型與學習類型"}, {"batch": "115年第二次", "batchCode": "115T2", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "D", "number": 37, "id": "115T2-S1-37", "question": "某醫療AI 系統使用深度學習模型分析胸腔X 光影像，判斷患者是否罹患肺炎。 醫院評估委員會要求系統必須能夠標示「影像中哪些區域對本次診斷判斷影響最大」，以供放射科醫師進行審核確認。 下列哪一種可解釋AI 技術最能直接滿足「標示影像中對預測結果影響最大的區域」此一需求？", "options": {"A": "LIME（Local Interpretable Model-agnostic Explanations）", "B": "SHAP（SHapley Additive exPlanations）", "C": "部分依賴圖（Partial Dependence Plot, PDP）", "D": "顯著性圖（Saliency Map）"}, "topic": "AI治理、法規與倫理"}, {"batch": "115年第二次", "batchCode": "115T2", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "C", "number": 38, "id": "115T2-S1-38", "question": "某電商平台希望偵測異常評論行為，例如大量重複貼文或疑似機器人生成的評論。由於此類異常樣本難以事先完整標記，系統主要依據大量正常評論的分布來識別偏離行為。下列哪一種機器學習框架最能滿足此系統的設計需求？", "options": {"A": "非監督式學習（Unsupervised Learning）的關聯規則挖掘，從評論中找出常見字詞組合", "B": "監督式學習（Supervised Learning）的二元分類，從已標記資料學習分類模型", "C": "半監督式學習（Semi-supervised Learning）的異常偵測，辨識偏離正常分布的評論行為", "D": "強化學習（Reinforcement Learning），透過回饋機制優化評論判斷策略"}, "topic": "No-Code／Low-Code與流程自動化"}, {"batch": "115年第二次", "batchCode": "115T2", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "C", "number": 39, "id": "115T2-S1-39", "question": "在命名實體辨識（Named Entity Recognition, NER）任務中，模型需根據整句文字判斷每個詞的標籤，並考慮詞與詞之間的關聯性。若採用 Conditional Random Field（CRF）作為模型，下列何者最能描述其模型類型？", "options": {"A": "生成式模型（Generative Model）", "B": "無監督模型（Unsupervised Model）", "C": "鑑別式模型（Discriminative Model）", "D": "自迴歸模型（Autoregressive Model）"}, "topic": "生成式AI與LLM應用"}, {"batch": "115年第二次", "batchCode": "115T2", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "C", "number": 40, "id": "115T2-S1-40", "question": "某音樂串流平台希望開發一套AI 系統，能根據平台上累積的大量歌曲資料，自動生成具有不同風格變化的全新旋律，供創作者作為靈感參考。平台技術長在評估方案時強調，系統不能只是播放或拼接既有歌曲片段，也不能僅進行資料的重建，而是要真正學習音樂的結構與風格，並創作出從未出現過的新旋律。 請問下列哪一種模型技術最符合此需求？", "options": {"A": "K-近鄰演算法（K-Nearest Neighbors, KNN）", "B": "自編碼器（Autoencoder）", "C": "生成對抗網路（GAN）", "D": "隨機森林（Random Forest）"}, "topic": "No-Code／Low-Code與流程自動化"}, {"batch": "115年第二次", "batchCode": "115T2", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "C", "number": 41, "id": "115T2-S1-41", "question": "某資安公司正在評估導入機器學習模型來偵測網路流量中的異常連線行為。技術團隊在比較各種演算法時，其中一位工程師建議採用支援向量機（SVM）。請問下列何者最正確敘述支援向量機的特性？", "options": {"A": "擅長處理大規模非結構化資料，且模型訓練完成後可自動適應新進資料而無需重新建模", "B": "透過多個模型的集體決策來提升預測穩定性，在資料量不足時仍能維持一定的準確率", "C": "在高維度且樣本數相對有限的情境下表現良好，但當訓練資料量龐大時運算成本會顯著上升", "D": "具備強大的特徵自動萃取能力，特別適合影像與語音等需要逐層抽象化處理的複雜任務"}, "topic": "AI治理、法規與倫理"}, {"batch": "115年第二次", "batchCode": "115T2", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "C", "number": 42, "id": "115T2-S1-42", "question": "下列哪一項是可解釋人工智慧（XAI）領域，LIME（Local Interpretable Model- agnostic Explanations）最可能被用於的情境？", "options": {"A": "分析即時通訊系統中訊息傳輸效率的瓶頸", "B": "建立機制以強化系統中的資料安全與隱私保護", "C": "當某筆貸款申請被模型拒絕時，分析該筆資料中各項因素與結果之間的關聯", "D": "監控並優化推薦系統的回應速度與系統效能，以提升整體使用體驗"}, "topic": "AI治理、法規與倫理"}, {"batch": "115年第二次", "batchCode": "115T2", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "B", "number": 43, "id": "115T2-S1-43", "question": "某信用評分公司導入SHAP（SHapley Additive exPlanations）框架分析機器學習模型的輸出行為。分析師希望了解：「對於某位特定申請人被評為高風險的信用評分，各項輸入特徵分別對這個評分結果貢獻了多少」。下列哪一項最能正確說明SHAP Shapley 值在此情境中所提供的資訊？", "options": {"A": "各特徵在模型訓練過程中對結果穩定性的影響程度", "B": "此申請人的各項特徵，分別讓風險評分上升或下降的影響程度", "C": "各特徵在所有客戶資料中對整體預測準確度的影響程度", "D": "各特徵在模型中被使用的頻率"}, "topic": "AI治理、法規與倫理"}, {"batch": "115年第二次", "batchCode": "115T2", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "C", "number": 44, "id": "115T2-S1-44", "question": "某金融集團評估將大型語言模型導入客服與風控系統，團隊採用如120B 參數等級的超大型語言模型以確保回應品質。請問下列何者最能說明企業在正式環境部署超大型語言模型時，最需要優先考量的因素？", "options": {"A": "模型參數量龐大，導致每次輸出結果差異極大，難以符合金融業對回應一致性的要求", "B": "超大型模型無法支援批次處理，在高併發的客服場景下將造成嚴重的服務瓶頸", "C": "推理延遲較高且運算資源消耗龐大，每次請求成本遠高於小型模型，需在模型效能與營運成本之間審慎權衡", "D": "模型會依任務複雜度自動調整運算資源配置，因此不需特別考量推理成本"}, "topic": "生成式AI與LLM應用"}, {"batch": "115年第二次", "batchCode": "115T2", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "B", "number": 45, "id": "115T2-S1-45", "question": "某智慧交通系統在城市主要路口安裝監視攝影機，需即時識別畫面中的汽車、 機車、公車等不同車輛類型，並統計各路口的車輛流量以支援號誌控制優化。 下列哪一種神經網路架構最適合處理此類影像中的物件類型識別任務？", "options": {"A": "循環神經網路（RNN），適合處理序列資料", "B": "卷積神經網路（CNN），適合處理影像資料", "C": "長短期記憶網路（LSTM），適合處理長期依賴", "D": "多層感知機（MLP），將輸入資料轉換為數值後進行分類"}, "topic": "機器學習模型與學習類型"}, {"batch": "115年第二次", "batchCode": "115T2", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "C", "number": 46, "id": "115T2-S1-46", "question": "AutoSkill 框架的主要目標是什麼？", "options": {"A": "建立一個降低對大型語言模型（LLM）依賴的自動化系統", "B": "透過持續更新模型參數來提升任務表現", "C": "將重複的互動經驗轉化為可重複使用的明確技能模組", "D": "透過檢索外部知識來改善模型回應品質"}, "topic": "生成式AI與LLM應用"}, {"batch": "115年第二次", "batchCode": "115T2", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "B", "number": 47, "id": "115T2-S1-47", "question": "某大型語言模型（LLM）在訓練過程中，研究人員發現模型在生成文本時，長期集中產生少數幾種相似的回應形式，缺乏多樣性。下列何者最能說明此現象及其可能原因？", "options": {"A": "過度擬合（Overfitting）", "B": "模式崩潰（Mode Collapse）", "C": "梯度消失（Vanishing Gradient）", "D": "模型收斂速度（Convergence Rate）"}, "topic": "生成式AI與LLM應用"}, {"batch": "115年第二次", "batchCode": "115T2", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "B", "number": 48, "id": "115T2-S1-48", "question": "某電商平台建置機器學習模型，用於預測用戶在瀏覽特定商品後的購買機率。 模型上線初期表現穩定，但維運團隊在定期審查中發現兩種不同情形： 情形甲：模型上線半年後恰逢消費趨勢轉變，過去高購買意願的用戶行為模式 （如長時間停留商品頁）不再是強烈的購買訊號，即便輸入特徵分布與訓練期相近，模型預測準確率仍明顯下降。 情形乙：平台新增了行動裝置端的入口，新用戶的年齡分布、裝置類型與使用時段特徵與原訓練資料差異顯著，導致模型對這批用戶的預測偏差增大。 下列哪一項最能正確對應兩種情形所屬的模型劣化類型？", "options": {"A": "甲為資料漂移（Data Drift）、乙為概念漂移（Concept Drift）", "B": "甲為概念漂移（Concept Drift）、乙為資料漂移（Data Drift）", "C": "甲為模型過擬合（Overfitting）、乙為資料漂移（Data Drift）", "D": "甲與乙均屬概念漂移（Concept Drift），因為兩者都導致模型預測準確率下降"}, "topic": "No-Code／Low-Code與流程自動化"}, {"batch": "115年第二次", "batchCode": "115T2", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "D", "number": 49, "id": "115T2-S1-49", "question": "某資安公司目前以鑑別式AI 偵測已知網路攻擊。為因應新型變種攻擊，研究人員計劃利用生成式AI 模擬可能的攻擊流量，並納入防禦模型訓練。下列何者最能說明此做法對鑑別式AI 防禦模型的主要助益？", "options": {"A": "生成式AI 可取代真實攻擊資料，降低蒐集成本", "B": "生成式AI 可直接負責防禦決策，取代原有模型", "C": "模擬攻擊資料可使模型自動轉為生成式架構", "D": "將模擬攻擊納入訓練，可提升模型對未知攻擊的辨識能力"}, "topic": "AI治理、法規與倫理"}, {"batch": "115年第二次", "batchCode": "115T2", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "B", "number": 50, "id": "115T2-S1-50", "question": "某企業已部署一套預訓練大型語言模型作為內部知識問答系統，主要用於查詢人資、財務與法遵相關的內部規範。由於公司內規每月都會滾動更新，管理層要求系統在文件更新後必須能立即反映最新內容，不能等待模型重新訓練。技術團隊正在評估應採用檢索增強生成（RAG）還是微調（Fine-tuning）來因應此需求。請問下列哪一項評估最為正確？", "options": {"A": "採用Fine-tuning 較為適合，只要定期將更新後的內規文件加入訓練資料，模型便能即時反映最新規範內容", "B": "採用RAG 較為適合，將更新後的文件同步至外部知識庫，模型即可在不重新訓練的情況下立即查詢最新內容", "C": "採用Fine-tuning 較為適合，因為模型經過內規語料訓練後，回應品質會優於透過RAG 生成的答案", "D": "兩者皆可達成需求，差異僅在於建置成本高低，與系統能否即時反映更新內容無關"}, "topic": "生成式AI與LLM應用"}, {"batch": "115年第二次", "batchCode": "115T2", "subject": "第二科：生成式AI應用與規劃", "subjectCode": "S2", "answer": "B", "number": 1, "id": "115T2-S2-01", "question": "一家會計師事務所希望透過Low-Code 工具，自動處理客戶提交的各類費用報銷單據，格式涵蓋手寫、PDF 掃描、電子發票等多種形式，且各企業的科目分類規則均不相同。負責評估的專案經理正在比較兩種方案：方案甲為「直接呼叫基礎語言模型API 進行單據內容解析與分類」，方案乙為「使用內建RAG 元件，比對過去已正確分類的報銷單據」。下列分析何者最為正確？", "options": {"A": "方案甲優於方案乙，因為基礎語言模型具備更廣泛的通用知識，足以應對所有格式變化", "B": "方案乙優於方案甲，因為RAG 能提供歷史分類案例作為參考上下文，顯著提升非結構化文件的分類準確率", "C": "兩者效果相同，差異僅在於系統複雜度，應優先選擇建置較簡單的方案甲", "D": "可透過預先設定固定分類規則的方式處理報銷單據，以提升處理效率並降低系統複雜度"}, "topic": "生成式AI與LLM應用"}, {"batch": "115年第二次", "batchCode": "115T2", "subject": "第二科：生成式AI應用與規劃", "subjectCode": "S2", "answer": "A", "number": 2, "id": "115T2-S2-02", "question": "某客服主管希望在Low-Code 平台中設定自動化流程：當客戶訊息被AI 判定為 「退費意圖」，且退費金額大於10,000 元時，即自動發送緊急通知給主管。此需求最可能透過下列哪一種元件實現？", "options": {"A": "條件分支（Branching / Router），依據多重條件判斷流程走向", "B": "資料格式化（Formatter），用於整理與轉換流程中的資料格式", "C": "迭代／迴圈（Iterator），逐筆處理多筆資料並依序執行流程", "D": "陣列聚合器（Array Aggregator），將多筆資料整合後再進行後續處理"}, "topic": "No-Code／Low-Code與流程自動化"}, {"batch": "115年第二次", "batchCode": "115T2", "subject": "第二科：生成式AI應用與規劃", "subjectCode": "S2", "answer": "B", "number": 3, "id": "115T2-S2-03", "question": "某人資部門使用Dify 平台建立了一個AI 面試輔助機器人，協助HR 在面試過程中即時查詢應徵者的過往提問紀錄。然而測試時發現，機器人完全無法記住同一位應徵者在五分鐘前說過的話，每次回應都像是全新對話。以下哪個措施能從根本上解決此問題？", "options": {"A": "提升語言模型的溫度參數（Temperature）", "B": "在每次API 請求中，手動將歷史對話內容（Chat History）一併打包送入模型進行推理", "C": "改用具備更多參數的大型多模態模型，以強化跨輪對話的理解能力", "D": "為伺服器增加記憶體容量，擴充系統可儲存的對話快取空間"}, "topic": "生成式AI與LLM應用"}, {"batch": "115年第二次", "batchCode": "115T2", "subject": "第二科：生成式AI應用與規劃", "subjectCode": "S2", "answer": "C", "number": 4, "id": "115T2-S2-04", "question": "在使用API 串接生成式AI 服務時，Token 會影響模型的計費。請問下列何者最正確敘述 Token 在LLM 應用中的意義？", "options": {"A": "Token 是模型將文字切分後的基本單位，通常與字詞或子詞對應，文件長度與Token 數量具有一定關聯性", "B": "Token 是模型用來表示整段文字語意的向量單位，用於理解輸入內容的語意結構", "C": "Token 的數量會影響模型的輸入輸出長度與計費，而上下文長度受限於模型可處理的最大 Token 數量", "D": "Token 只影響模型的運算速度，不影響API 的使用成本"}, "topic": "生成式AI與LLM應用"}, {"batch": "115年第二次", "batchCode": "115T2", "subject": "第二科：生成式AI應用與規劃", "subjectCode": "S2", "answer": "D", "number": 5, "id": "115T2-S2-05", "question": "一家連鎖零售業者使用某封閉式No-Code 平台多年，將客戶資料、訂單流程與內部作業高度整合於該平台。近期業者進行系統盤點時發現，該平台資料採專有格式儲存，匯出功能有限，且未提供標準API 支援。在此情境下，長期而言，該企業最可能面臨下列何種風險？", "options": {"A": "員工需具備撰寫進階程式語法的能力，才能持續使用該平台進行系統操作", "B": "隨著系統使用時間增加，平台運算效能將逐漸下降，影響營運效率", "C": "系統運作過程中較容易發生資安漏洞，導致資料外洩風險提高", "D": "企業在未來更換系統時，將因資料與功能難以轉移而高度依賴原平台"}, "topic": "AI治理、法規與倫理"}, {"batch": "115年第二次", "batchCode": "115T2", "subject": "第二科：生成式AI應用與規劃", "subjectCode": "S2", "answer": "B", "number": 6, "id": "115T2-S2-06", "question": "某物流公司評估導入No-Code／Low-Code 平台，希望能與現有的ERP 系統、倉儲管理系統及客戶通知平台進行資料串接。若主要考量系統整合能力，而非介面美觀度或功能豐富性，下列哪一項平台特性最能滿足此整合需求？", "options": {"A": "平台是否提供強制將所有應用程式部署於地端伺服器的選項，以確保資料不外流", "B": "平台是否具備豐富的API 介接能力、Webhooks 機制與開放式架構，能順暢串接既有系統", "C": "平台是否內建將圖形化流程還原為原始程式碼的編譯工具，以便未來自行維護", "D": "平台是否採用封閉式架構設計，以降低外部系統整合所帶來的安全風險"}, "topic": "No-Code／Low-Code與流程自動化"}, {"batch": "115年第二次", "batchCode": "115T2", "subject": "第二科：生成式AI應用與規劃", "subjectCode": "S2", "answer": "B", "number": 7, "id": "115T2-S2-07", "question": "某企業導入No-Code／Low-Code 平台後，發現各部門可快速開發AI 應用，但同時產生大量重複功能之應用程式，且模型使用方式不一致，導致治理困難與風險上升。若企業希望在維持「AI 民主化」前提下改善此問題，下列何者最適當之作法？", "options": {"A": "全面禁止業務單位自行開發AI 應用，統一由資訊部門負責", "B": "建立應用開發與模型使用之治理規範與共用標準", "C": "停止使用No-Code／Low-Code 工具，改採傳統開發模式", "D": "限制AI 應用僅能用於單一部門內部使用"}, "topic": "AI治理、法規與倫理"}, {"batch": "115年第二次", "batchCode": "115T2", "subject": "第二科：生成式AI應用與規劃", "subjectCode": "S2", "answer": "C", "number": 8, "id": "115T2-S2-08", "question": "在自動化工作流程中，Webhook 是一種由事件觸發、系統會主動回應的機制， 請問下列何者最符合此運作邏輯？", "options": {"A": "你在訂位平台設定「開放提醒」，系統每隔10 分鐘會自動幫你重新查詢各餐廳空位狀況，若有變動再通知你", "B": "餐廳將每日訂位與候位資料整理至公開看板，你可以隨時打開查看最新狀態", "C": "你在餐廳留下聯絡方式並設定偏好條件，當有符合條件的空位釋出時，餐廳會依照事先約定方式直接將資訊傳送給你", "D": "你加入餐廳的會員系統，餐廳會定期寄送電子報，內容包含近期優惠與部分訂位統計資訊"}, "topic": "No-Code／Low-Code與流程自動化"}, {"batch": "115年第二次", "batchCode": "115T2", "subject": "第二科：生成式AI應用與規劃", "subjectCode": "S2", "answer": "A", "number": 9, "id": "115T2-S2-09", "question": "某紡織品製造公司需建立品質控制流程：當AI 系統檢測到瑕疵產品時，自動通知品管人員、更新庫存系統，並生成品質報告。公司資訊人力僅兩人，主要負責系統維運，且不具備自行開發能力，若希望在不導入大型企業系統的情況下，快速完成流程建置，下列何者最適合？", "options": {"A": "使用No-Code 工具串接AI 檢測、通知與報表功能，快速建立自動化流程", "B": "委託外部專業團隊，依公司需求客製化所有功能模組後再上線使用", "C": "導入具流程自動化功能的SaaS 平台，並進行系統整合與客製化設定", "D": "使用試算表與簡易腳本輔助記錄與通知，逐步優化現有人工流程"}, "topic": "No-Code／Low-Code與流程自動化"}, {"batch": "115年第二次", "batchCode": "115T2", "subject": "第二科：生成式AI應用與規劃", "subjectCode": "S2", "answer": "C", "number": 10, "id": "115T2-S2-10", "question": "某家企業希望開發股票交易輔助工具，要求該工具需要在接收到市場報價資料的50 毫秒內完成訊號判斷與下單指令，且每秒需處理超過一萬筆高併發交易。 若選用Low-Code 平台開發，最難克服的先天限制為何？", "options": {"A": "Low-Code 平台無法串接任何金融市場的外部API，因此無法獲取即時報價資料", "B": "Low-Code 平台無法串接任何券商平台的下單API，因此無法進行即時交易", "C": "Low-Code 底層封裝通用框架，在毫秒級延遲與超高吞吐量（Throughput）的極限效能場景中，難以進行深度底層優化", "D": "Low-Code 平台無法建立即時更新的使用者介面，無法顯示動態報價資訊"}, "topic": "No-Code／Low-Code與流程自動化"}, {"batch": "115年第二次", "batchCode": "115T2", "subject": "第二科：生成式AI應用與規劃", "subjectCode": "S2", "answer": "B", "number": 11, "id": "115T2-S2-11", "question": "某中小企業行銷部門主管希望在不需高度依賴IT 支援的情況下，快速建立一套能自動分析顧客問卷回饋並進行情緒分類的系統。他評估了AutoML 平台與自行開發機器學習模型兩種方案。下列何者最能說明AutoML 在此情境下的核心優勢？", "options": {"A": "AutoML 仍需使用者熟悉Python 與深度學習框架，否則無法進行模型訓練", "B": "AutoML 可自動完成模型選擇、特徵處理與訓練流程，使非技術背景人員也能快速建立並上線模型", "C": "AutoML 僅適用於文字情緒分析，若應用於其他預測任務需重新開發系統", "D": "AutoML 產出的模型無法直接應用於實務場景，仍需完全重寫程式才能使用"}, "topic": "No-Code／Low-Code與流程自動化"}, {"batch": "115年第二次", "batchCode": "115T2", "subject": "第二科：生成式AI應用與規劃", "subjectCode": "S2", "answer": "A", "number": 12, "id": "115T2-S2-12", "question": "某電商平台導入CLIP（Contrastive Language-Image Pre-training）模型，讓使用者能直接輸入文字描述來搜尋商品圖片。請問CLIP 模型是透過哪一種方式來衡量文字描述與圖片之間的相符程度？", "options": {"A": "餘弦相似度（Cosine Similarity），計算文字與圖片在向量空間中的方向相似程度", "B": "BLEU 分數，衡量文字描述與圖片標題之間的詞彙重疊程度", "C": "交叉熵損失（Cross-Entropy Loss），用於衡量模型預測機率與實際標籤之間的差異", "D": "F1 分數（F1 Score），綜合評估搜尋結果的精確率與召回率"}, "topic": "No-Code／Low-Code與流程自動化"}, {"batch": "115年第二次", "batchCode": "115T2", "subject": "第二科：生成式AI應用與規劃", "subjectCode": "S2", "answer": "D", "number": 13, "id": "115T2-S2-13", "question": "某新創公司正在評估開發方式，產品負責人希望讓非技術背景的業務同仁也能參與功能原型的快速開發。團隊討論採用Vibe Coding 與Low-Code 兩種方式。 請問下列哪一項對於Vibe Coding 與Low-Code 的敘述最為正確？", "options": {"A": "兩者本質相同，差異僅在於Vibe Coding 以對話介面取代視覺化拖拉操作， 最終產出的程式碼品質與可維護性並無顯著差異", "B": "Vibe Coding 需要開發者具備一定的程式語言基礎才能有效審閱 AI 產出的程式碼，因此與Low-Code 平台相比，不適合非技術人員使用", "C": "Low-Code 平台因具備完整的視覺化與流程控制，較適合開發穩定且可維護的系統；Vibe Coding 則較適用於快速原型開發，難以支援結構複雜的正式應用系統", "D": "Vibe Coding 透過自然語言驅動AI 生成客製化程式碼，彈性較高但產出品質高度依賴提示詞的描述精準度；Low-Code 平台則透過預設元件組合快速建構， 上限受限於平台本身支援的功能範疇"}, "topic": "生成式AI與LLM應用"}, {"batch": "115年第二次", "batchCode": "115T2", "subject": "第二科：生成式AI應用與規劃", "subjectCode": "S2", "answer": "B", "number": 14, "id": "115T2-S2-14", "question": "某軟體開發公司評估導入Agentic Coding 工具（如Claude Code），並規劃相應的人工審核機制。請問下列何者最能正確敘述此類工具在開發流程中，所支援的核心操作能力？", "options": {"A": "透過介面提供程式碼建議與修改建議，實際套用仍需由開發者手動確認與操作，無法直接對專案檔案進行自動變更", "B": "可直接在開發環境中讀寫專案檔案、執行終端機指令（如測試與建置），並在適當情境下協助完成修改、測試與版本提交（commit）等多步驟開發流程", "C": "著重於將需求轉換為系統設計與架構規劃，程式碼撰寫與整合仍主要由開發者負責，較少直接介入實際開發流程", "D": "工具主要負責輔助開發者撰寫與優化程式碼，實際的測試、建置與版本控管流程仍需由開發者手動執行"}, "topic": "生成式AI與LLM應用"}, {"batch": "115年第二次", "batchCode": "115T2", "subject": "第二科：生成式AI應用與規劃", "subjectCode": "S2", "answer": "B", "number": 15, "id": "115T2-S2-15", "question": "某新創公司希望針對特定醫療診斷任務微調語言模型，但受限於資料取得困難，目前僅收集到少量已標註的診斷病例。在標註資料極為有限的條件下，強化微調（Reinforcement Fine-Tuning, RFT）相較於監督式微調（Supervised Fine- Tuning, SFT)）最主要的優勢為何？", "options": {"A": "RFT 需仰賴大量高品質標註資料進行訓練，因此在資料有限時仍能維持較佳穩定性", "B": "RFT 透過獎懲回饋機制引導模型優化，對大量標註資料的依賴相對較低，較適用於資料有限的情境", "C": "RFT 與SFT 在資料需求上本質相同，主要差異僅在訓練效率，資料量不影響兩者適用性", "D": "RFT 可直接從未標註的診斷資料中自動產生正確標註，因此在資料有限時可完全取代SFT"}, "topic": "生成式AI與LLM應用"}, {"batch": "115年第二次", "batchCode": "115T2", "subject": "第二科：生成式AI應用與規劃", "subjectCode": "S2", "answer": "A", "number": 16, "id": "115T2-S2-16", "question": "某企業導入AI 代理（AI Agent）系統，期望其可依據任務目標，自主規劃步驟、調用外部工具並完成任務。下列何者最能體現AI Agent 與傳統自動化系統之關鍵差異？", "options": {"A": "能依任務目標動態決策行動並調整執行策略", "B": "可依預先設定流程自動執行固定任務", "C": "可透過圖形化介面讓非技術人員操作", "D": "能處理大量結構化資料並進行批次運算"}, "topic": "生成式AI與LLM應用"}, {"batch": "115年第二次", "batchCode": "115T2", "subject": "第二科：生成式AI應用與規劃", "subjectCode": "S2", "answer": "A", "number": 17, "id": "115T2-S2-17", "question": "某律師事務所因業務量快速成長，正在評估導入生成式AI 工具以減輕律師的行政負擔，請問下列哪一項最符合生成式AI 目前在法律實務中的主要應用？", "options": {"A": "快速爬梳大量相關判例、協助起草合約初稿並標記文件中的潛在風險條款", "B": "根據案件事實與法條自動做出判決建議，並作為法官裁決依據直接採用", "C": "在正式庭審中代替律師進行言詞答辯，並即時調整辯護策略", "D": "分析嫌疑人的歷史行為模式，預測其未來可能再犯的時間與地點供執法單位參考"}, "topic": "生成式AI與LLM應用"}, {"batch": "115年第二次", "batchCode": "115T2", "subject": "第二科：生成式AI應用與規劃", "subjectCode": "S2", "answer": "D", "number": 18, "id": "115T2-S2-18", "question": "某律師事務所導入AI 合約審查系統，協助律師快速檢視商業合約中的關鍵條款。系統架構師在設計上下文（Context）時最優先考量應為何？", "options": {"A": "強化模型的創意生成能力", "B": "儘量壓縮上下文（Context）長度以降低Token 成本", "C": "優先提升模型回應速度", "D": "優先保留原文逐字精確性"}, "topic": "生成式AI與LLM應用"}, {"batch": "115年第二次", "batchCode": "115T2", "subject": "第二科：生成式AI應用與規劃", "subjectCode": "S2", "answer": "C", "number": 19, "id": "115T2-S2-19", "question": "某客服系統導入AI 技術，能先從知識庫中檢索相關文件，再依據查詢內容生成回覆。若需判斷其技術本質，下列敘述何者最適當？", "options": {"A": "屬於純粹資料檢索系統，未涉及生成式AI", "B": "屬於傳統規則式系統，依既定流程回應問題", "C": "結合檢索與生成機制，仍屬生成式AI 應用範疇", "D": "屬於預測分析系統，主要進行結果推估"}, "topic": "生成式AI與LLM應用"}, {"batch": "115年第二次", "batchCode": "115T2", "subject": "第二科：生成式AI應用與規劃", "subjectCode": "S2", "answer": "D", "number": 20, "id": "115T2-S2-20", "question": "某開發團隊在使用AI 程式設計助手開發資料管線系統（Data Pipeline System） 時，發現生成的Python 資料處理套件呼叫方式已是舊版API，與最新官方文件不符，導致部分功能執行失敗。請問應導入何種技術，使系統能在推理過程中即時存取並導入最新外部文件內容，以確保生成結果符合最新API 規範？", "options": {"A": "模型微調（Fine-tuning），將最新文件資料重新訓練進模型權重，讓模型永久記住最新API", "B": "知識蒸餾（Knowledge Distillation），將大型文件資料庫壓縮為輕量化的專用小型模型", "C": "提示詞快取（Prompt Caching），將常用文件內容快取於提示中，使模型可重複使用既有資訊並降低延遲", "D": "透過MCP（Model Context Protocol）工具整合，讓模型在推理時即時存取並整合最新的外部文件內容"}, "topic": "生成式AI與LLM應用"}, {"batch": "115年第二次", "batchCode": "115T2", "subject": "第二科：生成式AI應用與規劃", "subjectCode": "S2", "answer": "D", "number": 21, "id": "115T2-S2-21", "question": "某企業導入生成式影像AI 工具以提升商品圖片處理效率，並允許使用者以自然語言描述編輯需求。下列何者最不屬於該類工具之典型功能範疇？", "options": {"A": "依指令移除圖片中不需要的物件並修補背景", "B": "依指令調整商品影像之光影與色彩風格", "C": "依指令將影像中特定元素替換為其他物件", "D": "依圖像內容自動判斷商品銷售數據並生成分析報表"}, "topic": "生成式AI與LLM應用"}, {"batch": "115年第二次", "batchCode": "115T2", "subject": "第二科：生成式AI應用與規劃", "subjectCode": "S2", "answer": "C", "number": 22, "id": "115T2-S2-22", "question": "某保險公司導入具備延伸推理（Extended Thinking）功能的推理型語言模型，用於處理理賠申請的合規審查。審查團隊發現：簡單案件只需快速比對幾項條款，但複雜案件需要多層次的法規詮釋與過往案例比對。產品負責人希望系統能依案件複雜度自動調整模型的推理深度，以在品質與成本之間取得最佳平衡。此需求最核心涉及的系統設計概念是什麼？", "options": {"A": "針對不同案件調整模型的溫度參數（Temperature），以控制回應的隨機性與多樣性", "B": "針對複雜案件改用參數規模更大的模型版本，以確保推理品質", "C": "依案件複雜度動態設定模型在推理過程中可使用的最大思考資源上限（如 Token 預算），以平衡推理深度與成本效率", "D": "在提示詞（Prompt）中增加更多說明與範例內容，以提升模型對複雜案件的理解能力"}, "topic": "AI治理、法規與倫理"}, {"batch": "115年第二次", "batchCode": "115T2", "subject": "第二科：生成式AI應用與規劃", "subjectCode": "S2", "answer": "C", "number": 23, "id": "115T2-S2-23", "question": "某公司開發一個AI 助理，能長期記住使用者的重要資訊（例如偏好與歷史需求），並在後續對話中加以利用。系統設計採用Titans 架構的 Memory as Context（MAC）機制，希望模型在回應時能同時參考目前對話與過去記憶。請問在此設計下，長期記憶最可能是下列哪一種使用方式？", "options": {"A": "將記憶模組整合進模型內部，讓每一層都使用記憶資訊", "B": "利用記憶調整模型的注意力強弱，使部分內容被優先關注", "C": "將記憶整理成重點內容，與目前輸入一起提供給模型作為額外參考", "D": "不使用記憶模組，而是單純增加模型可處理的文字長度"}, "topic": "AI應用情境與基本概念"}, {"batch": "115年第二次", "batchCode": "115T2", "subject": "第二科：生成式AI應用與規劃", "subjectCode": "S2", "answer": "C", "number": 24, "id": "115T2-S2-24", "question": "某企業導入AI 技術改善營運效率。下列何者最不符合AI Agent 之典型特性？", "options": {"A": "可依任務目標動態規劃處理流程", "B": "可視情境調用不同外部工具完成任務", "C": "可依提示生成多樣化文本內容", "D": "可在執行過程中調整策略以達成目標"}, "topic": "生成式AI與LLM應用"}, {"batch": "115年第二次", "batchCode": "115T2", "subject": "第二科：生成式AI應用與規劃", "subjectCode": "S2", "answer": "D", "number": 25, "id": "115T2-S2-25", "question": "某企業在設計AI 代理（AI Agent）時，需判斷是否採用ReAct（Reason and Act）架構。下列哪一種情境最適合使用ReAct 技術？", "options": {"A": "將固定格式的PDF 合約批次翻譯成多種語言並自動儲存，流程明確且步驟固定", "B": "根據既有規則判斷客戶是否符合退貨條件，並依結果回覆對應訊息", "C": "根據使用者問題依既定流程進行多步資料查詢與整理，並產出整合回覆", "D": "分析某新創公司的融資狀況，AI 需自行判斷資訊是否足夠並調整查詢方向"}, "topic": "生成式AI與LLM應用"}, {"batch": "115年第二次", "batchCode": "115T2", "subject": "第二科：生成式AI應用與規劃", "subjectCo     const STORAGE_KEY = 'ipas_ai_junior_trainer_v1';
    const BATCHES = [...new Set(QUESTION_BANK.map(q => q.batch))];

    let state = { mode:'random', quiz:[], index:0, answers:{}, flagged:{}, optionOrders:{}, startedAt:null, practiceMode:false, passLine:70 };
    function loadStore() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || { mistakes:{}, history:[] }; } catch(e) { return { mistakes:{}, history:[] }; } }
    function saveStore(store) { localStorage.setItem(STORAGE_KEY, JSON.stringify(store)); }
    function toast(msg) { const t=document.getElementById('toast'); t.textContent=msg; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'), 1800); }
    function byId(id) { return document.getElementById(id); }
    function shuffle(arr) { const a=[...arr]; for(let i=a.length-1;i>0;i--) { const j=Math.floor(Math.random()*(i+1)); [a[i],a[j]]=[a[j],a[i]]; } return a; }
    function pct(n,d) { return d ? Math.round(n/d*100) : 0; }
    function escapeHtml(s) { return String(s).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }
    function init() { byId('batchSelect').innerHTML = BATCHES.map(b=>`<option value="${b}">${b}</option>`).join(''); byId('subjectSelect').innerHTML = [`<option value="${ALL_SUBJECT}">${ALL_SUBJECT}</option>`, ...SUBJECTS.map(s=>`<option value="${s}">${s}</option>`)].join(''); renderDashboard(); renderMistakePreview(); setMode('random'); }
    function renderDashboard() { const store=loadStore(); const mistakes=Object.keys(store.mistakes).length; const history=store.history || []; const best = history.length ? Math.max(...history.map(h=>h.score)) : '-'; const last = history.length ? history[history.length-1].score + '分' : '尚無紀錄'; byId('dashboard').innerHTML = `<div class="card metric"><span>總題庫</span><strong>${QUESTION_BANK.length}</strong><span>3 個梯次 × 2 科</span></div><div class="card metric"><span>錯題本</span><strong>${mistakes}</strong><span>可重考、匯出、逐題訂正</span></div><div class="card metric"><span>最佳成績</span><strong>${best}</strong><span>最近一次：${last}</span></div>`; }
    function setMode(mode) { state.mode=mode; byId('modeRandom').classList.toggle('active', mode==='random'); byId('modeBatch').classList.toggle('active', mode==='batch'); byId('batchField').classList.toggle('hide', mode!=='batch'); byId('countField').classList.toggle('hide', mode==='batch'); byId('wrongOnlyWrap').classList.toggle('hide', mode!=='random'); if(mode==='batch') byId('wrongOnly').checked=false; }
    function filters() { return { batch: byId('batchSelect').value, subject: byId('subjectSelect').value, count: Math.max(1, parseInt(byId('questionCount').value || '30',10)), shuffleQuestions: byId('shuffleQuestions').checked, shuffleOptions: byId('shuffleOptions').checked, practiceMode: byId('practiceMode').checked, wrongOnly: byId('wrongOnly').checked, passLine: Math.max(0, Math.min(100, parseInt(byId('passLine').value || '70',10))) }; }
    function makePool(f) { let pool = QUESTION_BANK; if(state.mode==='batch') pool = pool.filter(q => q.batch === f.batch); if(f.subject !== ALL_SUBJECT) pool = pool.filter(q => q.subject === f.subject); if(state.mode==='random' && f.wrongOnly) { const ids = new Set(Object.keys(loadStore().mistakes)); pool = pool.filter(q => ids.has(q.id)); } return pool; }
    function startQuiz() { const f=filters(); state.passLine=f.passLine; state.practiceMode=f.practiceMode; let pool=makePool(f); if(!pool.length) return toast('目前沒有符合條件的題目。'); let quiz = f.shuffleQuestions ? shuffle(pool) : [...pool]; if(state.mode==='random') quiz = quiz.slice(0, Math.min(f.count, quiz.length)); resetQuizState(quiz, f.shuffleOptions); showQuiz(); }
    function startWrongReviewQuiz() { const ids = new Set(Object.keys(loadStore().mistakes)); const quiz = QUESTION_BANK.filter(q => ids.has(q.id)); if(!quiz.length) return toast('錯題本目前是空的。'); state.passLine = filters().passLine; state.practiceMode = byId('practiceMode').checked; resetQuizState(shuffle(quiz), byId('shuffleOptions').checked); showQuiz(); }
    function resetQuizState(quiz, shuffleOptions) { state.quiz=quiz; state.index=0; state.answers={}; state.flagged={}; state.startedAt=Date.now(); state.optionOrders={}; for(const q of quiz) state.optionOrders[q.id] = shuffleOptions ? shuffle(['A','B','C','D']) : ['A','B','C','D']; }
    function showSetup() { byId('setupView').classList.remove('hide'); byId('quizView').classList.add('hide'); byId('resultView').classList.add('hide'); renderDashboard(); renderMistakePreview(); }
    function showQuiz() { byId('setupView').classList.add('hide'); byId('resultView').classList.add('hide'); byId('quizView').classList.remove('hide'); renderQuestion(); }
    function renderQuestion() { const q=state.quiz[state.index]; const ans=state.answers[q.id]; byId('quizMeta').innerHTML = `<span class="pill">${q.batch}</span><span class="pill">${q.subject}</span><span class="pill">原題第 ${q.number} 題</span><span class="pill">${q.topic}</span>`; byId('progressBar').style.width = `${pct(state.index+1,state.quiz.length)}%`; const order = state.optionOrders[q.id] || ['A','B','C','D']; const showFeedback = state.practiceMode && ans; let options = order.map(letter => { let cls='option'; if(ans===letter) cls += ' selected'; if(showFeedback && letter===q.answer) cls += ' correct'; if(showFeedback && ans===letter && ans!==q.answer) cls += ' wrong'; return `<div class="${cls}" onclick="selectAnswer('${q.id}','${letter}')"><div class="opt-letter">${letter}</div><div>${escapeHtml(q.options[letter])}</div></div>`; }).join(''); let note=''; if(showFeedback) { const ok = ans===q.answer; note = `<div class="practice-note ${ok?'ok':'bad'}"><strong>${ok?'答對。':'答錯。'}</strong>${correctionText(q, ans)}</div>`; } byId('questionHost').innerHTML = `<div class="q-meta"><span>第 ${state.index+1} / ${state.quiz.length} 題</span>${state.flagged[q.id] ? '<span class="pill">已標記</span>' : ''}</div><div class="q-title">${escapeHtml(q.question)}</div>${options}${note}`; renderNav(); }
    function renderNav() { const answered=Object.keys(state.answers).length; byId('quizStatus').innerHTML = `已答 ${answered} / ${state.quiz.length} 題`; byId('navGrid').innerHTML = state.quiz.map((q,i)=>`<button class="nav-dot ${i===state.index?'current':''} ${state.answers[q.id]?'answered':''} ${state.flagged[q.id]?'flagged':''}" onclick="goQuestion(${i})">${i+1}</button>`).join(''); }
    function selectAnswer(qid, letter) { state.answers[qid]=letter; renderQuestion(); }
    function nextQuestion() { if(state.index < state.quiz.length-1) { state.index++; renderQuestion(); } else toast('已到最後一題，可交卷評分。'); }
    function prevQuestion() { if(state.index>0) { state.index--; renderQuestion(); } }
    function goQuestion(i) { state.index=i; renderQuestion(); }
    function toggleFlag() { const q=state.quiz[state.index]; state.flagged[q.id]=!state.flagged[q.id]; renderQuestion(); }
    function correctionText(q, selected) { const your = selected ? `你的答案為 (${selected}) ${q.options[selected] || '未作答'}。` : '你未作答。'; return `${your} 正解為 (${q.answer}) ${q.options[q.answer]}。訂正重點：先確認題幹是否在問「正確／不正確／最適合／最不適當」，再回到考點「${q.topic}」判斷選項是否符合定義、流程或應用情境。`; }
    function gradeQuiz() { let correct=0, wrong=[]; for(const q of state.quiz) { const selected=state.answers[q.id] || null; if(selected===q.answer) correct++; else wrong.push({...q, selected}); } return { total:state.quiz.length, correct, wrong, score:pct(correct,state.quiz.length), unanswered:state.quiz.filter(q=>!state.answers[q.id]).length }; }
    function submitQuiz() { const g=gradeQuiz(); if(g.unanswered && !confirm(`尚有 ${g.unanswered} 題未作答，仍要交卷嗎？`)) return; const store=loadStore(); const now=new Date().toISOString(); for(const w of g.wrong) { const old=store.mistakes[w.id] || { count:0 }; store.mistakes[w.id] = { count:(old.count||0)+1, lastSelected:w.selected, lastWrongAt:now }; } for(const q of state.quiz) { if(state.answers[q.id]===q.answer && store.mistakes[q.id]) store.mistakes[q.id].lastCorrectAt=now; } const record={ date:now, score:g.score, total:g.total, correct:g.correct, mode:state.mode, wrong:g.wrong.length }; store.history = [...(store.history||[]), record].slice(-30); saveStore(store); renderResults(g); }
    function breakdown(questions, answers) { const map={}; for(const q of questions) { const key=q.topic; if(!map[key]) map[key]={total:0,correct:0}; map[key].total++; if(answers[q.id]===q.answer) map[key].correct++; } return Object.entries(map).sort((a,b)=>a[1].correct/a[1].total - b[1].correct/b[1].total); }
    function subjectBreakdown(questions, answers) { const map={}; for(const q of questions) { const key=q.subject; if(!map[key]) map[key]={total:0,correct:0}; map[key].total++; if(answers[q.id]===q.answer) map[key].correct++; } return Object.entries(map); }
    function renderResults(g) { byId('quizView').classList.add('hide'); byId('setupView').classList.add('hide'); byId('resultView').classList.remove('hide'); const passed = g.score >= state.passLine; const topics = breakdown(state.quiz, state.answers).map(([k,v])=>`<tr><td>${k}</td><td>${v.correct} / ${v.total}</td><td>${pct(v.correct,v.total)}%</td></tr>`).join(''); const subjects = subjectBreakdown(state.quiz, state.answers).map(([k,v])=>`<tr><td>${k}</td><td>${v.correct} / ${v.total}</td><td>${pct(v.correct,v.total)}%</td></tr>`).join(''); const wrongHtml = g.wrong.length ? g.wrong.map(w=>reviewCard(w, w.selected, true)).join('') : '<div class="empty">本次沒有錯題。</div>'; byId('resultView').innerHTML = `<section class="card result-hero"><div class="score-circle"><strong>${g.score}</strong><span>分</span></div><div><span class="badge">測驗結果</span><h2>${passed ? '達到自訂及格線' : '尚未達到自訂及格線'}</h2><p class="muted">答對 ${g.correct} / ${g.total} 題；錯題 ${g.wrong.length} 題；未作答 ${g.unanswered} 題。自訂及格線：${state.passLine} 分。</p><div class="footer-actions"><button class="btn brand" onclick="retakeWrongFromLast()">重考本次錯題</button><button class="btn secondary" onclick="showSetup()">回首頁</button><button class="btn ghost" onclick="window.print()">列印訂正</button></div></div></section><section class="grid cols-2" style="margin-top:18px;"><div class="card"><h2>主題弱點分析</h2><table><thead><tr><th>主題</th><th>答對</th><th>正確率</th></tr></thead><tbody>${topics}</tbody></table></div><div class="card"><h2>科目分析</h2><table><thead><tr><th>科目</th><th>答對</th><th>正確率</th></tr></thead><tbody>${subjects}</tbody></table></div></section><section class="card" style="margin-top:18px;"><h2>錯題訂正</h2>${wrongHtml}</section>`; window.lastWrongIds = g.wrong.map(w=>w.id); renderDashboard(); }
    function retakeWrongFromLast() { const ids = new Set(window.lastWrongIds || []); const quiz = QUESTION_BANK.filter(q=>ids.has(q.id)); if(!quiz.length) return toast('本次沒有錯題。'); resetQuizState(shuffle(quiz), byId('shuffleOptions').checked); showQuiz(); }
    function reviewCard(q, selected, fromResult=false) { const opts = ['A','B','C','D'].map(k=>`<div class="${k===q.answer?'ok-text':(k===selected?'danger-text':'')}">(${k}) ${escapeHtml(q.options[k])}</div>`).join(''); return `<div class="review-card"><div class="pillrow"><span class="pill">${q.batch}</span><span class="pill">${q.subject}</span><span class="pill">第 ${q.number} 題</span><span class="pill">${q.topic}</span></div><h3>${escapeHtml(q.question)}</h3><div class="small" style="line-height:1.8;">${opts}</div><p class="practice-note bad"><strong>訂正：</strong>${correctionText(q, selected)}</p>${fromResult?'':`<button class="btn secondary" onclick="markMastered('${q.id}')">已掌握，移出錯題本</button>`}</div>`; }
    function renderMistakePreview() { const store=loadStore(); const entries=Object.entries(store.mistakes||{}); if(!entries.length) { byId('mistakePreview').innerHTML='<div class="empty">目前沒有錯題。完成測驗後，系統會自動把答錯題目放入錯題本。</div>'; return; } const top = entries.sort((a,b)=>(b[1].count||0)-(a[1].count||0)).slice(0,8); byId('mistakePreview').innerHTML = top.map(([id,m])=>{ const q=QUESTION_BANK.find(x=>x.id===id); return q ? reviewCard(q, m.lastSelected, false) : ''; }).join('') + (entries.length>8 ? `<p class="muted small">僅預覽前 8 題高頻錯題；可按「重考全部錯題」完整練習。</p>` : ''); }
    function markMastered(id) { const store=loadStore(); delete store.mistakes[id]; saveStore(store); renderDashboard(); renderMistakePreview(); toast('已從錯題本移除。'); }
    function exportMistakes() { const store=loadStore(); const rows=[['題目ID','梯次','科目','原題號','主題','錯誤次數','上次作答','正解','題目','正確選項內容']]; for(const [id,m] of Object.entries(store.mistakes||{})) { const q=QUESTION_BANK.find(x=>x.id===id); if(q) rows.push([q.id,q.batch,q.subject,q.number,q.topic,m.count||1,m.lastSelected||'',q.answer,q.question,q.options[q.answer]]); } if(rows.length===1) return toast('錯題本目前是空的。'); const csv=rows.map(r=>r.map(v=>'"'+String(v).replaceAll('"','""')+'"').join(',')).join('\n'); const blob=new Blob(['\ufeff'+csv],{type:'text/csv;charset=utf-8;'}); const url=URL.createObjectURL(blob); const a=document.createElement('a'); a.href=url; a.download='IPAS_AI初級錯題本.csv'; a.click(); URL.revokeObjectURL(url); }
    function resetAllData() { if(!confirm('確定清除所有測驗紀錄與錯題本？')) return; localStorage.removeItem(STORAGE_KEY); renderDashboard(); renderMistakePreview(); toast('紀錄已清除。'); }
    init();
  </script>
