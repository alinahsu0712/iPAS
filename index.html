number": 26, "id": "114T4-S1-26", "question": "在深度學習模型的微調（Fine-tuning）過程中，可能出現所謂的「災難性遺忘（Catastrophic Forgetting）」。此現象最可能造成哪種情況？", "options": {"A": "由於計算資源或訓練步驟不足，模型在微調過程中無法完整收斂， 導致學習效果受限", "B": "微調後模型的表現變得隨機，無法有效記憶新學到的模式與知識", "C": "微調後模型的部分權重產生偏移，導致模型無法針對較長的文字進行回應", "D": "模型過度適應微調的資料分佈，逐漸遺忘先前預訓練所獲得的廣泛知識，在原有任務或廣泛領域上表現變差"}, "topic": "生成式AI與LLM應用"}, {"batch": "114年第四梯次", "batchCode": "114T4", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "B", "number": 27, "id": "114T4-S1-27", "question": "在大型Transformer 模型的效能優化過程中，常見的方法之一是「剪枝（Pruning）」。下列哪一項最符合該方法的核心概念？", "options": {"A": "將模型中所有權重按比例縮小，使其值更接近零，以降低計算量", "B": "移除模型中影響較小或冗餘的部分權重參數，以減少模型大小並提升推理效率", "C": "在訓練時僅更新部分權重而將其他權重凍結，從而減少需要調整的參數數量", "D": "根據注意力分數動態跳過處理部分輸入Token，以減少每次前向傳播的計算"}, "topic": "生成式AI與LLM應用"}, {"batch": "114年第四梯次", "batchCode": "114T4", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "D", "number": 28, "id": "114T4-S1-28", "question": "對非常長的輸入序列進行推理（Inference），Transformer 模型推理的主要計算瓶頸通常是什麼？", "options": {"A": "模型輸出層產生文本的過程，因為每生成一個詞都必須重新訓練整個模型一次", "B": "詞嵌入 (Embedding) 查找操作，因為其時間複雜度隨詞彙表大小指數級增長", "C": "Softmax 函數的計算，因為對每個Token 都需要執行繁重的運算", "D": "自注意力層的計算和其記憶體使用，因為注意力矩陣的大小隨序列長度呈平方級增長"}, "topic": "生成式AI與LLM應用"}, {"batch": "114年第四梯次", "batchCode": "114T4", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "A", "number": 29, "id": "114T4-S1-29", "question": "在「可解釋人工智慧（Explainable AI, XAI）」領域中，LIME（Local Interpretable Model-agnostic Explanations）方法最核心的應用目的是什麼？", "options": {"A": "解釋單一樣本（局部預測）的黑箱模型決策過程", "B": "全面提升黑箱模型整體的預測準確度", "C": "將黑箱模型轉換成完全可解釋的模型作為替代", "D": "用於生成大量擬真數據來替代訓練集"}, "topic": "AI治理、法規與倫理"}, {"batch": "114年第四梯次", "batchCode": "114T4", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "A", "number": 30, "id": "114T4-S1-30", "question": "在醫療診斷決策支援系統等高風險領域中，「可解釋人工智慧 （Explainable AI, XAI）」的核心價值最主要呈現在哪個面向？", "options": {"A": "透過提供可理解的決策依據，促進患者與醫療專業人員對系統診斷結果的信任與接受度", "B": "以可解釋性方法優化臨床資料蒐集與管理流程，從而降低整體醫療作業成本", "C": "利用解釋機制增強模型預測的統計顯著性與準確度，使其在研究及實務應用中更具科學性", "D": "透過提供透明化的運作過程，進而減輕臨床人員負擔，並提升醫療服務的整體效率"}, "topic": "AI治理、法規與倫理"}, {"batch": "114年第四梯次", "batchCode": "114T4", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "D", "number": 31, "id": "114T4-S1-31", "question": "在金融科技公司的信貸決策系統中，導入反事實解釋（Counterfactual Explanation）時，實際部署往往伴隨技術與監管挑戰。下列哪一項最符合該情境下的核心挑戰？", "options": {"A": "需要建立完整的客戶行為預測模型來估算建議改變的實施成本，並整合到現有的風險管理系統架構中", "B": "必須使用聯邦學習技術保護客戶隱私，同時在分散式環境中計算跨機構的反事實解釋結果", "C": "需要建構時間序列因果圖來處理客戶信用狀況的動態變化，並預測未來可能的信用評分軌跡", "D": "生成的反事實樣本必須滿足特徵間的因果約束和業務邏輯約束，同時確保建議的改變在現實中具有可操作性且符合公平放貸法規"}, "topic": "AI治理、法規與倫理"}, {"batch": "114年第四梯次", "batchCode": "114T4", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "B", "number": 32, "id": "114T4-S1-32", "question": "在統計推論中，若樣本來自母體但呈現明顯偏態分布，且樣本數有限， 下列哪一項策略最能減少推估母體參數的偏誤？", "options": {"A": "直接使用樣本平均數與變異數估計母體參數，不做任何調整", "B": "增加樣本數並考慮使用分位數或中位數作為中心趨勢估計", "C": "將樣本隨機重新排列後，多次計算平均值以消除偏態影響", "D": "完全依賴樣本標準差來估計母體參數，忽略分布形態"}, "topic": "AI治理、法規與倫理"}, {"batch": "114年第四梯次", "batchCode": "114T4", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "D", "number": 33, "id": "114T4-S1-33", "question": "在工業物聯網架構中，進行設備預測性維護（Predictive Maintenance） 時，若面對異常事件發生頻率極低、樣本高度不平衡的時間序列資料， 下列哪一種方法最能兼顧模型穩定性與異常偵測效能？", "options": {"A": "將每筆異常事件資料複製多次以提升模型對異常的辨識敏感度，搭配全序列訓練模型（如LSTM）", "B": "對時間序列進行差分與標準化後，使用傳統監督式學習模型（如 SVM）進行分類訓練", "C": "使用經過時間序列特化的SMOTE 技術生成異常樣本，以平衡異常與正常資料比例", "D": "採用基於重建誤差的自編碼器模型（Sequence-to-Sequence Autoencoder）進行異常偵測，並僅使用正常資料進行訓練"}, "topic": "機器學習模型與學習類型"}, {"batch": "114年第四梯次", "batchCode": "114T4", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "C", "number": 34, "id": "114T4-S1-34", "question": "在零售業進行客戶行為分析時，資料倉儲中發現多個欄位儲存相同的購買金額資訊（例如：amount_usd、total_price、transaction_value）， 但其單位、命名慣例及格式不一致，進而導致特徵工程階段混淆模型輸入。針對此種跨欄位語義重疊與結構冗餘問題，下列哪一種資料處理策略最合適且具實務可行性？", "options": {"A": "利用資料探勘技術自動選擇資料集中對目標變數最敏感的欄位，其他欄位捨棄即可，避免過度清理干擾原始結構", "B": "保留所有相似欄位，交由高階模型（如Gradient Boosting 或 Deep Learning）自動學習特徵關聯，無需手動處理", "C": "建立欄位命名標準，統一金額單位與格式，進行欄位正規化與語義合併，減少重複資訊影響特徵重要性估計", "D": "將重複欄位視為類別欄位，進行One-hot 編碼（One-hot encoding） 後輸入模型，以避免數值誤導模型學習過程"}, "topic": "資料處理、特徵工程與資料品質"}, {"batch": "114年第四梯次", "batchCode": "114T4", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "D", "number": 35, "id": "114T4-S1-35", "question": "某大型零售企業準備將商品推薦模型上線，專案團隊在檢視訓練資料時，發現部分商品類別（例如高價商品）樣本數量極少，而多數樣本集中於低價商品。若此不平衡問題未妥善處理，下列何種狀況最可能在實際推薦結果中發生？", "options": {"A": "模型在預測時傾向輸出稀有類別，導致雖能捕捉到少數樣本，但精確率（Precision）顯著下降", "B": "模型由於類別分布不均，難以建立有效的線性分離邊界，進而無法收斂", "C": "模型過度聚焦於稀有類別樣本，導致對多數類別的預測能力下降， 整體效能受損", "D": "模型學到的決策邊界主要由多數類別主導，忽視了稀有類別，造成該類別的召回率（Recall）大幅降低"}, "topic": "機器學習模型與學習類型"}, {"batch": "114年第四梯次", "batchCode": "114T4", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "C", "number": 36, "id": "114T4-S1-36", "question": "某電商資料團隊要協助行銷部門規劃再行銷策略。目前取得資料包含使用者點擊、購買紀錄、流量來源與轉換率。若資料團隊希望先進行探索性資料分析（EDA），下列哪一項最符合EDA 的做法？", "options": {"A": "建立隨機森林模型，預測使用者是否會完成購買", "B": "使用K-means 對使用者群進行分群並立即制定對應促銷策略", "C": "繪製各類流量來源對轉換率的關聯圖，尋找潛在關係", "D": "對不同購物路徑設定統計假設並進行雙樣本t 檢定"}, "topic": "機器學習模型與學習類型"}, {"batch": "114年第四梯次", "batchCode": "114T4", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "B", "number": 37, "id": "114T4-S1-37", "question": "某金融科技公司在利用歷史交易資料建立風險控管模型時，嘗試推估整體詐騙交易比例。近期發現，樣本間存在明顯的時間序列相關性，導致模型在實際偵測新交易時誤判率升高。若希望同時改善詐騙比例推估的準確性並提升模型的穩健性，下列哪一種做法最為合適？", "options": {"A": "擴充樣本數量，以涵蓋更多潛在的詐騙型態，但維持既有的隨機抽樣方式不變", "B": "採取時間序列敏感的抽樣策略，例如依據交易時間區間進行分層， 以保存原始的時間結構特性", "C": "將資料完全隨機打散，以降低序列相關性對模型訓練造成的影響", "D": "在模型評估時，針對相鄰時間區段進行誤差合併，以便用整體估計方式修正詐騙比例"}, "topic": "機器學習模型與學習類型"}, {"batch": "114年第四梯次", "batchCode": "114T4", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "C", "number": 38, "id": "114T4-S1-38", "question": "某公司建置基於檢索增強生成（RAG）的知識查詢系統，需同時兼顧查詢效能與資料的即時更新。近期發現回應內容偶爾過時，且每次更新文件都需完整重建索引，導致系統在更新期間無法服務。若要解決此問題並提升整體穩健性，下列哪項做法最適合？", "options": {"A": "調整生成模型的回應隨機性參數，以降低答案偏差並提升一致性", "B": "提升檢索與索引的運算效能，以縮短查詢與更新所需時間", "C": "採用索引的增量或分段更新方式，使新資料能即時納入而不需全部重建", "D": "建立常見問題的標準答案集，透過快速檢索回應以降低模型負擔"}, "topic": "生成式AI與LLM應用"}, {"batch": "114年第四梯次", "batchCode": "114T4", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "A", "number": 39, "id": "114T4-S1-39", "question": "某醫院計畫開發住院日數預測模型，以協助病房調度。多數病人的住院日數集中在3–7 天，但仍有少數重症患者因治療需求而住院日數明顯偏長。醫院希望採用一種合適的評估方式，既能兼顧大部分病人的預測準確度，也能確保對重症個案的預測維持穩健。下列哪一種方法最符合此需求？", "options": {"A": "在模型檢核時，同時呈現平均絕對誤差（MAE）與重症子群的誤差指標", "B": "僅針對一般病人樣本進行交叉驗證，以避免重症個案拉高誤差", "C": "將所有病人的住院日數進行標準化處理，以減少數值範圍差異的影響", "D": "只採用單一的整體決定係數 (R²) 作為模型優劣的判斷依據"}, "topic": "資料處理、特徵工程與資料品質"}, {"batch": "114年第四梯次", "batchCode": "114T4", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "D", "number": 40, "id": "114T4-S1-40", "question": "關於監督式學習（Supervised Learning）與非監督式學習 （Unsupervised Learning）的目標，下列敘述何者錯誤？ 1.非監督式學習的核心在於發掘資料內在結構，例如分群、關聯規則與降維，而不依賴外部標籤。 2.監督式學習的典型應用為分類與迴歸，通常不適合應用於異常偵測任務。 3.非監督式學習若搭配少量標註資料，即會完全轉化為監督式學習。 4.監督式學習仰賴已標註的資料集，透過最小化輸出與真實標籤之間的差距，學習輸入與目標之間的對應函數。 5.所有監督式學習任務都必須要有大量完整標註資料，否則無法進行任何有效的模型訓練。 6.非監督式學習不需要目標變數，僅透過輸入資料本身的特徵分布進行模式學習。", "options": {"A": "3、5、6", "B": "1、4、6", "C": "2、4、6", "D": "2、3、5"}, "topic": "機器學習模型與學習類型"}, {"batch": "114年第四梯次", "batchCode": "114T4", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "D", "number": 41, "id": "114T4-S1-41", "question": "一家旅遊平台希望建立模型，預測顧客下次是否會再次透過該平台訂房。資料包含：顧客ID、年齡、旅遊次數、平均花費金額、主要交通方式（火車/飛機/自駕/公車）、會員等級（普通/進階/白金）、是否為海外旅遊等。下列哪一種特徵工程方法最適合處理「主要交通方式」欄位？", "options": {"A": "布林轉換（Boolean Conversion）", "B": "序數編碼（Ordinal Encoding）", "C": "數值標準化（Numerical Standardization）", "D": "One-hot 編碼（One-hot Encoding）"}, "topic": "No-Code／Low-Code與流程自動化"}, {"batch": "114年第四梯次", "batchCode": "114T4", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "C", "number": 42, "id": "114T4-S1-42", "question": "一家跨國醫療研究機構希望利用各地醫院的病患資料，建立一個能夠預測疾病早期風險的機器學習模型。由於各國法規限制，病患的原始資料無法集中到單一伺服器。在此情境下，下列哪一種方法最能同時滿足 「各醫院保留資料不外流」與「模型仍能跨院學習」的需求？", "options": {"A": "資料匿名化（Data Anonymization）", "B": "差分隱私（Differential Privacy）", "C": "聯邦學習（Federated Learning）", "D": "交叉驗證（Cross-validation）"}, "topic": "AI治理、法規與倫理"}, {"batch": "114年第四梯次", "batchCode": "114T4", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", 字表達上有差異，對診斷結果沒有重大影響", "B": "模型若資料不足，僅會降低生成報告的完整性，而非影響判斷病灶的正確性", "C": "模型偏向生成內容而非分類，但此差異僅影響效率，不會造成誤診風險", "D": "模型可能生成與實際影像不符的診斷結論，導致誤判並引發醫療與法律風險"}, "topic": "生成式AI與LLM應用"}, {"batch": "114年第四梯次", "batchCode": "114T4", "subject": "第二科：生成式AI應用與規劃", "subjectCode": "S2", "answer": "A", "number": 21, "id": "114T4-S2-21", "question": "某公司開發的智慧車載語音助理，可透過語音辨識（ASR）辨識駕駛語音，再由LLM 生成回答並查詢車載 API。測試中發現：ASR 對汽車專業術語辨識錯誤率高；LLM 的回覆常不精確；系統回覆延遲雖存在但仍可接受。若目標是「優先提升準確性與回答品質」，下列改進步驟的最合理執行順序為何？ 1. 擴充並標註汽車領域語音資料，微調 ASR 模型 2. 微調 LLM 並加入檢索增強（RAG） 3. 優化系統架構，引入批次推論降低延遲 4. 動態調整生成溫度，平衡準確度與多樣性", "options": {"A": "1 → 2 → 4 → 3", "B": "2 → 1→ 3 → 4", "C": "1 → 3 → 2 → 4", "D": "3 → 1 → 2 → 4"}, "topic": "生成式AI與LLM應用"}, {"batch": "114年第四梯次", "batchCode": "114T4", "subject": "第二科：生成式AI應用與規劃", "subjectCode": "S2", "answer": "C", "number": 22, "id": "114T4-S2-22", "question": "一家顧問公司使用生成式AI 協助撰寫數據分析報告。雖然模型在測試中表現優異，但其生成的報告多半僅遵循固定段落結構，替換數值或關鍵詞即可完成，卻未能展現針對不同專案的多樣化推理與分析。下列何者為造成這種現象的最合理解釋？", "options": {"A": "模型在生成過程中缺乏對字體與排版的優化能力，因此無法展現分析邏輯", "B": "測試資料涵蓋過多統計圖表，導致模型無法專注於文字內容的多樣化表達", "C": "模型過度依賴訓練語料中的常見報告範式，導致生成結果以樣板化結構取代真正的推理", "D": "模型因無法正確辨識報告中的頁碼與標題層級，才出現樣板化的結果"}, "topic": "生成式AI與LLM應用"}, {"batch": "114年第四梯次", "batchCode": "114T4", "subject": "第二科：生成式AI應用與規劃", "subjectCode": "S2", "answer": "D", "number": 23, "id": "114T4-S2-23", "question": "在應用零樣本提示（Zero-Shot Prompting）時，下列哪一種情境最可能因缺乏示範而失敗，出現語意錯誤或結構錯誤的輸出？", "options": {"A": "要求模型判斷一段影評文字的情感傾向", "B": "要求模型將一段新聞摘要濃縮為一句話", "C": "要求模型將一段繁體中文翻譯成英文", "D": "要求模型從表格中擷取所有城市的最高氣溫"}, "topic": "生成式AI與LLM應用"}, {"batch": "114年第四梯次", "batchCode": "114T4", "subject": "第二科：生成式AI應用與規劃", "subjectCode": "S2", "answer": "D", "number": 24, "id": "114T4-S2-24", "question": "某保險公司計畫導入生成式AI 的內部合約查詢系統，協助業務員與法務部門快速解讀保單條款與理賠規範。高層特別強調客戶資料隱私與合規風險控管，即使需要投入較多資源，也必須確保資料不會外洩。在此情況下，下列哪一種策略最符合公司的資料安全與合規優先考量？", "options": {"A": "導入開源模型並由IT 團隊自建，後續再逐步補強隱私與合規控管", "B": "在需求確認階段即納入法遵與稽核單位，設定準確率KPI，並透過 MVP 驗證成效", "C": "優先使用雲端大型API 模型快速部署，並根據使用數據持續調整", "D": "投入資源自訓並私有化部署LLM，並同步建立自動化風控機制"}, "topic" batch": "114年第四梯次", "batchCode": "114T4", "subject": "第二科：生成式AI應用與規劃", "subjectCode": "S2", "answer": "B", "number": 34, "id": "114T4-S2-34", "question": "某醫療機構計畫導入生成式AI 協助撰寫病歷摘要。在技術測試階段， 為確保系統能安全應用於臨床，最應優先關注下列哪一項指標？", "options": {"A": "資料儲存與存取架構的完整性，確保長期運作過程中的數據可追溯性", "B": "生成內容的醫療準確性與臨床一致性，避免出現錯誤或誤導性資訊", "C": "模型在不同病例語境下的泛化能力，確保不因個別樣本而偏差", "D": "系統回應時間的穩定性，以支援醫療場域中可能的即時需求"}, "topic": "生成式AI與LLM應用"}, {"batch": "114年第四梯次", "batchCode": "114T4", "subject": "第二科：生成式AI應用與規劃", "subjectCode": "S2", "answer": "B", "number": 35, "id": "114T4-S2-35", "question": "在即時客服系統的效能測試中，若針對延遲測試（Latency Testing） 進行評估，下列哪一項指標最能反映系統是否符合用戶即時互動需求？", "options": {"A": "AI 模型在同一分鐘內可完成的回覆訊息數量", "B": "客戶從輸入問題到收到第一個完整回應所需的時間", "C": "客服系統能連續提供服務的運行時長", "D": "AI 產生回答時用詞的多樣性與表達創意程度"}, "topic": "資料分析、視覺化與評估指標"}, {"batch": "114年第四梯次", "batchCode": "114T4", "subject": "第二科：生成式AI應用與規劃", "subjectCode": "S2", "answer": "A", "number": 36, "id": "114T4-S2-36", "question": "某航空公司導入生成式AI 聲控客服，提供航班與票務查詢。有人員透過惡意提示，試圖讓系統洩漏內部安檢流程。在此情境中，下列何者為降低提示攻擊（Prompt Injection）風險的最佳策略？", "options": {"A": "導入輸入檢測與回應審核流程，防止敏感指令被執行", "B": "限制AI 可回應的主題範圍，使系統僅回答非敏感的航班與票務查詢，避免處理內部或敏感流程資訊", "C": "隨機變化回覆內容，讓攻擊者難以預測回應行為以增加攻擊難度", "D": "擴充與更新航班與票務資料來源，以提升模型的知識正確性與覆蓋率"}, "topic": "生成式AI與LLM應用"}, {"batch": "114年第四梯次", "batchCode": "114T4", "subject": "第二科：生成式AI應用與規劃", "subjectCode": "S2", "answer": "A", "number": 37, "id": "114T4-S2-37", "question": "在機器學習模型的實務應用中，常會出現數據漂移（Data Drift）的情況。此現象主要是指下列哪一種情況？", "options": {"A": "訓練時使用的資料分佈，與部署後實際輸入資料的統計特徵隨時間逐漸出現差異，導致模型表現衰退", "B": "在資料前處理過程中，因特徵刪減或缺失補值不當，造成樣本資訊量下降", "C": "模型對訓練數據擬合過度，在未知數據上泛化能力不足", "D": "後端資料庫因欄位定義或結構調整，導致特徵提取流程與原始設計不一致"}, "topic": "機器學習模型與學習類型"}, {"batch": "114年第四梯次", "batchCode": "114T4", "subject": "第二科：生成式AI應用與規劃", "subjectCode": "S2", "answer": "C", "number": 38, "id": "114T4-S2-38", "question": "某銀行導入生成式AI 放貸審核系統，用於分析申貸人條件並生成初步審核意見。測試過程中發現，模型對不同族群的核准率存在顯著差異， 可能引發演算法偏見問題。為降低此風險，下列哪一項措施最合適？", "options": {"A": "提升模型運算速度與效能，以確保在大量申請中快速回應", "B": "全面移除與申貸人身份相關的敏感屬性，避免模型因變數影響而產生偏差", "C": "導入資料與結果的公平性檢測流程，並依合規規範調整模型或決策邏輯", "D": "減少訓練樣本數量，降低偏見被放大的可能性"}, "topic": "AI治理、法規與倫理"}, {"batch": "114年第四梯次", "batchCode": "114T4", "subject": "第二科：生成式AI應用與規劃", "subjectCode": "S2", "answer": "A", "number": 39, "id": "114T4-S2-39", "question": "在提示工程（Prompt Engineering）的應用中，Chain-of-Thought（CoT） 與Tree of Thoughts（ToT）各適用於不同的推理情境，請問以下兩個情境，分別最適合採用哪一種方法？ 情境一：電商公司開發客服助理，用來協助客戶查詢退款流程與相關規範情境二：活動策劃團隊使用AI 協助規劃多場跨部門行銷活動，需要同時考量預算、場地、時程與人力資源，並比較不同方案的可行性。", "options": {"A": "情境一採用CoT，情境二採用ToT", "B": "情境一採用ToT，情境二採用CoT", "C": "情境一與情境二都適合CoT", "D": "情境一與情境二都適合ToT"}, "topic": "生成式AI與LLM應用"}, {"batch": "114年第四梯次", "batchCode": "114T4", "subject": "第二科：生成式AI應用與規劃", "subjectCode": "S2", "answer": "D", "number": 40, "id": "114T4-S2-40", "question": "在生成式AI 的提示工程中，Graph Prompting 在處理複雜關係資料時， 為何通常比Chain-of-Thought（CoT）更有效？", "options": {"A": "Graph Prompting 幾乎不需要推理，只依靠圖結構即可得出結論", "B": "Graph Prompting 僅需單次提示，即可避免多輪推理的誤差累積", "C": "Graph Prompting 的生成速度通常更快，因此效率更高", "D": "Graph Prompting 能捕捉非線性結構與上下文關聯，適合處理網絡化資訊"}, "topic": "生成式AI與LLM應用"}, {"batch": "114年第四梯次", "batchCode": "114T4", "subject": "第二科：生成式AI應用與規劃", "subjectCode": "S2", "answer": "A", "number": 41, "id": "114T4-S2-41", "question": "在少樣本提示（Few-shot Prompting）僅能提供 1–2 個範例的情況下，若遇到領域偏移（Domain Shift），下列何者為模型最可能面臨的核心挑戰？", "options": {"A": "範例數量過少，無法涵蓋新領域的多樣性，導致模型泛化不足", "B": "範例表徵有限，模型容易依賴單一樣本特性而降低適應力", "C": "範例覆蓋不足，使模型難以抽取跨領域的穩定模式", "D": "範例資訊過於稀缺，模型缺乏應對不同輸入情境的能力"}, "topic": "生成式AI與LLM應用"}, {"batch": "114年第四梯次", "batchCode": "114T4", "subject": "第二科：生成式AI應用與規劃", "subjectCode": "S2", "answer": "A", "number": 42, "id": "114T4-S2-42", "question": "某金融機構導入檢索增強生成（Retrieval-Augmented Generation, RAG）模型，用於客服文件查詢與自動回覆。由於大型模型運算成本過高，若考慮引入知識蒸餾（Knowledge Distillation, KD）技術，下列何者為帶來的主要效益？", "options": {"A": "讓小型模型學習大型模型的知識，在降低運算成本的同時維持檢索與生成品質", "B": "只能應用於語音或影像辨識，無法提升文字檢索生成效能", "C": "因為RAG 已有檢索機制，因此無需額外蒸餾知識", "D": "僅能依賴特定 API 供應商才能使用，無法在自建模型中實現"}, "topic": "AI治理、法規與倫理"}, {"batch": "114年第四梯次", "batchCode": "114T4", "subject": "第二科：生成式AI應用與規劃", "subjectCode": "S2", "answer": "D", "number": 43, "id": "114T4-S2-43", "question": "在評估大型語言模型，例如7B、13B、175B 參數規模時，模型規模對基準測試（Benchmark）結果的影響，下列哪一種說法最為恰當？", "options": {"A": "小模型在正確調整下能超越大模型，因此模型大小並不重要", "B": "大模型在多數情境下表現較好，但在特定任務上略遜於小模型", "C": "模型規模與基準測試結果完全無關，影響主要來自測試設計", "D": "模型越大，Benchmark 結果可能提升，但幅度取決於訓練數據品質與資源配置"}, "topic": "生成式AI與LLM應用"}, {"batch": "114年第四梯次", "batchCode": "114T4", "subject": "第二科：生成式AI應用與規劃", "subjectCode": "S2", "answer": "C", "number": 44, "id": "114T4-S2-44", "question": "在AI 應用設計中，Model Context Protocol（MCP）與檢索增強生成 （RAG）都能擴展模型的能力，但兩者的核心差異主要為下列何者？", "options": {"A": "MCP 擴展模型工具，但主要用於補足訓練資料不足", "B": "MCP 能標準化連接資源，但仍需依賴向量資料庫", "C": "RAG 常用於擴展知識庫內容，而MCP 更著重於動態工具與API 呼叫的整合", "D": "RAG 透過統一協議，提升回答相關性"}, "topic": "生成式AI與LLM應用"}, {"batch": "114年第四梯次", "batchCode": "114T4", "subject": "第二科：生成式AI應用與規劃", "subjectCode": "S2", "answer": "A", "number": 45, "id": "114T4-S2-45", "question": "下列哪一個資料集專門設計用於測試大型語言模型在多領域、多任務語言理解中，涵蓋人文、科學與社會科學等領域，而非專門用於數學推理或中文專業知識？", "options": {"A": "MMLU", "B": "GSM8K", "C": "MATH", "D": "C-Eval"}, "topic": "AI治理、法規與倫理"}, {"batch": "114年第四梯次", "batchCode": "114T4", "subject": "第二科：生成式AI應用與規劃", "subjectCode": "S2", "answer": "D", "number": 46, "id": "114T4-S2-46", "question": "某智慧工廠導入生成式AI，協助產線工程師即時產生維修指引與操作建議。下列哪一項並非團隊在系統設計中加入Guardrails（防護機制） 的主要目的？", "options": {"A": "檢查工程師輸入內容，避免觸發錯誤或危險需求", "B": "過濾與驗證AI 輸出的維修指引，確保符合安全標準", "C": "確保生成的操作建議符合法規與產業安全規範", "D": "完整重建並追蹤 AI 模型的全部推理過程"}, "topic": "AI治理、法規與倫理"}, {"batch": "114年第四梯次", "batchCode": "114T4", "subject": "第二科：生成式AI應用與規劃", "subjectCode": "S2", "answer": "B", "number": 47, "id": "114T4-S2-47", "question": "某顧問公司導入生成式AI，協助團隊快速檢索並摘要長篇的法規文件。 為了改善檢索結果常出現不相關或過於分散內容的問題，下列何者為團隊決定對文件進行文本切分（Chunking）的主要目的？", "options": {"A": "讓模型在回答時能加快推理速度", "B": "提高檢索相關性與降低長上下文噪音", "C": "降低系統記憶體和硬體資源的負擔", "D": "使模型在生成回覆時更具創造性與多樣化"}, "topic": "AI治理、法規與倫理"}, {"batch": "114年第四梯次", "batchCode": "114T4", "subject": "第二科：生成式AI應用與規劃", "subjectCode": "S2", "answer": "A", "number": 48, "id": "114T4-S2-48", "question": "某開發團隊在建置企業內部知識檢索系統時，選擇採用多向量檢索器 （Multi-vector Retriever），下列何者為協助提升系統查詢的完整性與精準度的主要方式？", "options": {"A": "支援同時處理多種資訊表示，提升跨文本型態的檢索效果", "B": "透過多向量壓縮與共享權重方式，降低檢索過程的運算與儲存成本", "C": "以切分並過濾文件片段，減少上下文長度帶來的Token 負擔", "D": "透過調整生成階段的溫度參數，使模型在回覆時更穩定一致"}, "topic": "生成式AI與LLM應用"}, {"batch": "114年第四梯次", "batchCode": "114T4", "subject": "第二科：生成式AI應用與規劃", "subjectCode": "S2", "answer": "D", "number": 49, "id": "114T4-S2-49", "question": "在Agentic AI 的架構中，解決方案圖譜（Solution Graph）常被用來輔助代理的任務執行，其主要作用為何？", "options": {"A": "透過圖形結構完全取代大型語言模型的推理，讓代理只依靠圖演算法完成任務", "B": "僅用於保存代理的輸出結果，方便後續檢視與審計，而不影響實際推理流程", "C": "將代理限制在既定流程內，避免其產生偏離設計腳本的行為", "D": "作為代理在執行過程中的參考框架，用於組織決策步驟並支援任務推理"}, "topic": "生成式AI與LLM應用"}, {"batch": "114年第四梯次", "batchCode": "114T4", "subject": "第二科：生成式AI應用與規劃", "subjectCode": "S2", "answer": "C", "number": 50, "id": "114T4-S2-50", "question": "小明想開發一個部落格寫作工具，讓用戶輸入文章開頭後，系統自動幫忙寫出後續內容，例如輸入「今天去了台北木柵動物園...」，系統就能續寫。若要實現這樣的功能，最適合選擇下列哪一類任務？", "options": {"A": "序列到序列建模（Sequence-to-Sequence Modeling），透過輸入序列產生新的輸出序列", "B": "遮罩語言建模（Masked Language Modeling），補齊文字中缺失的詞語或片段", "C": "生成式語言建模（Text Generation），依據上下文持續產生新的內容", "D": "文本分類（Text Classification），針對輸入文本判斷情感、主題或標籤"}, "topic": "生成式AI與LLM應用"}, {"batch": "115年第一次", "batchCode": "115T1", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "D", "number": 1, "id": "115T1-S1-01", "question": "下列何者不屬於資料整合（Data Integration）的主要目的？", "options": {"A": "統一不同來源資料的格式與欄位定義，以確保分析一致性", "B": "識別並處理重複資料，避免影響模型訓練結果", "C": "整併多來源資料，以提升資料完整性與應用價值", "D": "依資料保存政策延長原始資料留存期限，以利未來可能的分析需求"}, "topic": "機器學習模型與學習類型"}, {"batch": "115年第一次", "batchCode": "115T1", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "D", "number": 2, "id": "115T1-S1-02", "question": "某智慧城市專案導入AI 技術，以優化垃圾收集路線調度並即時監測空氣品質變化。系統需持續蒐集環境數據（如 PM2.5、氣體濃度）與設備狀態（如垃圾桶滿溢度）。下列何種技術最直接支援上述需求？", "options": {"A": "專家系統（Expert System）", "B": "決策支援系統（Decision Support System）", "C": "啟發式決策引擎（Heuristic Decision Engine）", "D": "感知器網路（Sensor Network）"}, "topic": "資料處理、特徵工程與資料品質"}, {"batch": "115年第一次", "batchCode": "115T1", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "D", "number": 3, "id": "115T1-S1-03", "question": "下列何者不符合非監督式學習（Unsupervised Learning）的典型特徵？", "options": {"A": "模型可依據資料中的特徵相似性進行自動分群", "B": "訓練過程中不需仰賴事先定義的標籤資料", "C": "常用於探索資料的潛在結構或隱含模式", "D": "模型主要學習輸入特徵與既定目標標記之間的對應關係"}, "topic": "機器學習模型與學習類型"}, {"batch": "115年第一次", "batchCode": "115T1", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "C", "number": 4, "id": "115T1-S1-04", "question": "某保險公司建立AI 理賠金額預測模型。歷史理賠資料經檢定後呈近似常態分佈， 但仍存在少數極端高額案件。資料科學團隊在不破壞整體分佈特性的前提下，規劃進行離群值處理。下列何者最不適當？", "options": {"A": "依統計準則（如Z-score 或IQR）評估後，再決定是否調整或處理極端值", "B": "採用截尾（Trimming）處理極端值，以提升模型穩定性", "C": "使用One-hot 編碼（One-hot Encoding）將離群值轉換為類別特徵以改善數值穩定性", "D": "結合領域知識評估其合理性，再決定保留或修正"}, "topic": "資料處理、特徵工程與資料品質"}, {"batch": "115年第一次", "batchCode": "115T1", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "B", "number": 5, "id": "115T1-S1-05", "question": "某銀行建立AI 詐欺交易偵測模型。歷史交易資料中，詐欺樣本比例極低，導致模型訓練時偏向預測為「正常交易」。資料科學團隊評估採用SMOTE（Synthetic Minority Over-sampling Technique）改善訓練資料分佈。下列何者最符合SMOTE 技術的主要功能？", "options": {"A": "透過隨機刪除部分正常交易資料，以降低類別失衡程度", "B": "依據少數類別樣本的特徵空間，合成產生新的少數類別樣本", "C": "調整模型的損失函數（Loss Function）權重，使誤判少數類別時的懲罰提高", "D": "以交叉驗證（Cross-validation）方式重新分割資料集，使各折資料類別比例一致"}, "topic": "機器學習模型與學習類型"}, {"batch": "115年第一次", "batchCode": "115T1", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "C", "number": 6, "id": "115T1-S1-06", "question": "資料科學團隊在模型訓練前，需對數值特徵進行正規化（Normalization）或標準化（Standardization）。為確保模型評估結果具真實性並避免資料洩漏（Data Leakage），下列何者為最適當的作法？", "options": {"A": "於資料分割前，先對完整資料集計算統計量並進行標準化處理", "B": "先分割訓練資料（Training Data）和測試資料（Test Data），並各自獨立計算統計量後進行標準化", "C": "先分割訓練資料（Training Data）和測試資料（Test Data），僅以訓練資料計算統計量，再套用至測試資料", "D": "僅對訓練資料（Training Data）進行標準化處理，測試資料（Test Data）保持原始數值"}, "topic": "機器學習模型與學習類型"}, {"batch": "115年第一次", "batchCode": "115T1", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "C", "number": 7, "id": "115T1-S1-07", "question": "某電信公司建立機器學習模型預測用戶流失風險。資料中包含多個類別型特徵 （Categorical Features），例如「資費方案類型」與「客戶地區」。為使模型能有效使用這些特徵，下列何者最直接用於將類別型特徵轉換為模型可處理的數值格式？", "options": {"A": "資料分群（Data Clustering）", "B": "特徵交叉（Feature Cross）", "C": "One-hot 編碼（One-hot Encoding）", "D": "寬深模型（Wide and Deep）"}, "topic": "機器學習模型與學習類型"}, {"batch": "115年第一次", "batchCode": "115T1", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "D", "number": 8, "id": "115T1-S1-08", "question": "某零售企業在建置機器學習模型預測顧客購買機率時， 資料同時包含大量稀疏類別特徵與數值型特徵。 團隊希望模型既能學習過去已出現的特徵組合規律，也能對未出現的特徵組合做出合理預測。 下列哪一種模型架構最適合此類需求？", "options": {"A": "線性迴歸（Linear Regression）", "B": "決策樹（Decision Tree）", "C": "支援向量機（Support Vector Machine, SVM）", "D": "寬深模型（Wide and Deep）"}, "topic": "AI治理、法規與倫理"}, {"batch": "115年第一次", "batchCode": "115T1", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "A", "number": 9, "id": "115T1-S1-09", "question": "某影音串流平台建立神經網路模型，用於預測使用者最可能感興趣的影片類型。 模型輸出層需將結果轉換為各類別的機率分佈，以便系統依機率高低推薦內容。 下列哪一種函數最適合用於模型輸出層？", "options": {"A": "Softmax 函數（Softmax Function）", "B": "Sigmoid 函數（Sigmoid Function）", "C": "線性函數（Linear Function）", "D": "ReLU 函數（Rectified Linear Unit Function）"}, "topic": "No-Code／Low-Code與流程自動化"}, {"batch": "115年第一次", "batchCode": "115T1", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "A", "number": 10, "id": "115T1-S1-10", "question": "某設計公司導入生成式AI（Generative AI）工具，用於自動產生產品概念圖與風格草圖。為了讓系統能依據既有圖像資料產生具有變化且風格一致的新圖像，模型必須具備學習資料特性並生成新樣本的能力。下列哪一種模型技術或方法最符合上述需求？", "options": {"A": "隱變量自編碼器（Variational Autoencoder, VAE）", "B": "隨機森林（Random Forest）", "C": "K-近鄰演算法（K-Nearest Neighbors, KNN）", "D": "貝氏網路（Bayesian Network）"}, "topic": "生成式AI與LLM應用"}, {"batch": "115年第一次", "batchCode": "115T1", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "B", "number": 11, "id": "115T1-S1-11", "question": "某企業導入生成式AI（Generative AI）系統自動產出會議摘要，並規劃額外建置一套AI 系統，用於評估摘要內容的正確性與完整性。下列何者為此AI 系統的核心目標？", "options": {"A": "自動新增專業名詞與技術指標", "B": "判斷摘要是否遺漏關鍵資訊或出現語意錯誤", "C": "調整語音轉文字結果", "D": "自動標註摘要的關鍵字與主題標籤"}, "topic": "生成式AI與LLM應用"}, {"batch": "115年第一次", "batchCode": "115T1", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "B", "number": 12, "id": "115T1-S1-12", "question": "ChatGPT、Gemini 等對話型生成式AI 工具所依據的基礎模型技術，下列何者正確？", "options": {"A": "決策樹（Decision Tree）", "B": "大型語言模型（Large Language Model, LLM）", "C": "生成對抗網路（Generative Adversarial Network, GAN）", "D": "圖卷積網路（Graph Convolutional Network, GCN）"}, "topic": "生成式AI與LLM應用"}, {"batch": "115年第一次", "batchCode": "115T1", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "A", "number": 13, "id": "115T1-S1-13", "question": "根據《金融機構運用人工智慧技術作業規範》，金融機構於使用人工智慧提供金融服務並直接與消費者互動時，下列何者非必要揭露之資訊？", "options": {"A": "該服務之 AI 模型原始程式碼", "B": "服務適用對象與用途範圍", "C": "該服務是否為 AI 自動完成", "D": "該服務是否提供替代方案"}, "topic": "AI治理、法規與倫理"}, {"batch": "115年第一次", "batchCode": "115T1", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "B", "number": 14, "id": "115T1-S1-14", "question": "下列哪一項「AI 技術應用與產業領域」的對應最為恰當？", "options": {"A": "利用AI 分析商場顧客購買紀錄以預測股票市場波動—智慧交通", "B": "使用AI 進行設備故障預測與預防性維護—智慧製造", "C": "以 AI 模型融合即時氣象資料與乘客消費行為特徵，推薦會員升級優惠方案— 智慧醫療", "D": "利用 AI 分析社群媒體互動以提升臨床診斷準確度—金融服務業"}, "topic": "資料處理、特徵工程與資料品質"}, {"batch": "115年第一次", "batchCode": "115T1", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "A", "number": 15, "id": "115T1-S1-15", "question": "在資料處理中，下列何者屬於「結構化數據」的例子？", "options": {"A": "儲存在MySQL 資料庫中的訂單記錄", "B": "以JSON 格式儲存的商品訂單資訊", "C": "用XML 標註的產品目錄", "D": "儲存在純文字檔案中的客服對話紀錄"}, "topic": "AI應用情境與基本概念"}, {"batch": "115年第一次", "batchCode": "115T1", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "C", "number": 16, "id": "115T1-S1-16", "question": "關於敘述性統計指標，下列敘述何者最為正確？", "options": {"A": "中位數（Median）能有效反映極端值對資料分佈的影響", "B": "標準差（Standard Deviation）越大，代表資料越集中", "C": "百分位數（Percentile）主要用於衡量資料在整體分布中的相對位置", "D": "平均值（Mean）適合描述偏態且包含離群值（Outliers）的資料"}, "topic": "資料處理、特徵工程與資料品質"}, {"batch": "115年第一次", "batchCode": "115T1", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "A", "number": 17, "id": "115T1-S1-17", "question": "某企業資料分析人員需針對不同型態的數據選擇合適的視覺化工具。下列哪一種情境最適合使用直方圖（Histogram）？", "options": {"A": "檢視顧客年齡資料在不同區間的集中情形", "B": "分析產品售價與銷售量之間的關聯程度", "C": "比較各產品類別的年度銷售總額", "D": "在地圖上標示各縣市加盟店的地理分布位置"}, "topic": "資料處理、特徵工程與資料品質"}, {"batch": "115年第一次", "batchCode": "115T1", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "B", "number": 18, "id": "115T1-S1-18", "question": "某電商平台工程師需在已排序的價格清單中，快速定位指定價格是否存在，給定排序後陣列：arr = [3, 8, 14, 19, 21, 27, 33, 45, 52]。若搜尋目標值為27，且採用標準二分搜尋（Binary Search）流程（每次比較後排除中位數），請問最多需要比較幾次即可找到目標？", "options": {"A": "2 次", "B": "3 次", "C": "4 次", "D": "5 次"}, "topic": "No-Code／Low-Code與流程自動化"}, {"batch": "115年第一次", "batchCode": "115T1", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "A", "number": 19, "id": "115T1-S1-19", "question": "某物流公司導入強化式學習（Reinforcement Learning）優化車隊調度。模型在系統運行過程中，會依據不同配送狀態動態調整行動選擇方式，使決策結果逐步朝較佳績效收斂。上述模型在學習過程中的調整行為，最符合下列哪一項強化式學習核心機制？", "options": {"A": "調整策略函數以改變行動選擇機率", "B": "更新訓練資料分布以降低模型偏差", "C": "重新分群狀態資料以識別決策類型", "D": "建立正確決策標籤進行誤差修正"}, "topic": "機器學習模型與學習類型"}, {"batch": "115年第一次", "batchCode": "115T1", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "B", "number": 20, "id": "115T1-S1-20", "question": "某團隊訓練影像分類模型，發現模型在訓練資料上的準確率達98%，但在測試資料上僅有72%。若團隊希望提升模型對新資料的適應能力，並增加訓練資料的多樣性，下列何者最適合？", "options": {"A": "增加模型的深度與參數量，使模型學習更多細節", "B": "對訓練影像進行旋轉、翻轉等隨機變化", "C": "提高訓練速度，使模型更快完成學習", "D": "僅保留模型表現較好的訓練資料"}, "topic": "機器學習模型與學習類型"}, {"batch": "115年第一次", "batchCode": "115T1", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "D", "number": 21, "id": "115T1-S1-21", "question": "某時尚品牌導入生成式AI（Generative AI）技術，建立服裝設計輔助系統。系統需根據設計師輸入的風格條件，自動產生具有高度視覺品質、細節穩定且風格變化自然的服裝草圖。團隊特別重視生成結果的穩定性與多樣性控制能力。在此需求下，下列哪一種模型技術或方法較為適合？", "options": {"A": "支援向量機（Support Vector Machine, SVM）", "B": "生成對抗網路（Generative Adversarial Network, GAN）", "C": "決策樹（Decision Tree）", "D": "擴散模型（Diffusion Model）"}, "topic": "生成式AI與LLM應用"}, {"batch": "115年第一次", "batchCode": "115T1", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "C", "number": 22, "id": "115T1-S1-22", "question": "某製造業工廠規劃導入AI 監控系統，持續分析設備感測數據（如溫度、震動與壓力）。系統需能在缺乏完整異常標註資料的情況下，辨識與一般運作型態顯著不同的狀態，並發出預警。在此需求下，下列何種技術較為適合？", "options": {"A": "使用支援向量機（Support Vector Machine, SVM）建立異常分類模型", "B": "以決策樹（Decision Tree）學習異常類型的判斷規則", "C": "採用變分自編碼器（Variational Autoencoder, VAE）學習正常資料分佈", "D": "使用生成對抗網路（Generative Adversarial Network, GAN）直接預測異常標籤"}, "topic": "機器學習模型與學習類型"}, {"batch": "115年第一次", "batchCode": "115T1", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "B", "number": 23, "id": "115T1-S1-23", "question": "在AI 推論服務架構設計中，「批次推論（Batch Inference）」與「即時推論（Real- time Inference）」常依任務特性選擇不同機制。下列關於兩者特性的敘述何者最正確？", "options": {"A": "批次推論通常以同步請求方式回傳結果，以確保資料一致性；即時推論則多採非同步機制以提升系統吞吐量（Throughput）", "B": "批次推論多用於延遲容忍度較高的大規模資料處理，通常以吞吐量 （Throughput）最佳化為優先；即時推論則著重於請求回應時間的穩定性與低延遲特性", "C": "批次推論因計算資源需求高，僅適用於影像類模型；即時推論則主要應用於結構化資料模型", "D": "即時推論為確保回應速度，通常限制為單筆資料輸入；批次推論則可支援同步多筆資料即時回傳"}, "topic": "機器學習模型與學習類型"}, {"batch": "115年第一次", "batchCode": "115T1", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "D", "number": 24, "id": "115T1-S1-24", "question": "某企業導入大型語言模型作為客服助理。模型已具備穩定語言能力，但在回覆偏好一致性與組織規範遵循方面仍需優化，團隊因此規劃導入人類反饋強化學習 （RLHF）流程，下列何者最不屬於RLHF 階段的典型技術活動？", "options": {"A": "透過人工評估方式建立偏好資料，使模型的不同候選輸出可反映人類主觀品質差異", "B": "訓練一個能依據人類偏好判斷輸出品質的模型，作為模型優化過程中的回饋依據", "C": "依據品質評估結果，調整模型生成策略，使其輸出更符合偏好導向的行為表現", "D": "以未標註語料為主進行長週期表示學習訓練，以提升模型基礎語言建模能力"}, "topic": "生成式AI與LLM應用"}, {"batch": "115年第一次", "batchCode": "115T1", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "A", "number": 25, "id": "115T1-S1-25", "question": "在大型語言模型（LLM）的推論服務中，常透過請求批次處理（Batching）來提升系統效能。關於批次處理（Batching）機制的影響，下列敘述何者最正確？", "options": {"A": "Batching 可提升加速器資源使用效率並增加整體吞吐量（Throughput），但在部分情境下可能對單筆請求延遲造成影響", "B": "Batching 主要用於加快單筆請求回應時間", "C": "Batching 的效益主要來自降低記憶體使用量，對於吞吐量（Throughput）與延遲表現影響有限", "D": "Batching 在低併發（Concurrency）請求下，仍能明顯提升系統效能"}, "topic": "生成式AI與LLM應用"}, {"batch": "115年第一次", "batchCode": "115T1", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "C", "number": 26, "id": "115T1-S1-26", "question": "在可解釋AI(Explainable AI, XAI) 的分類架構中，LIME（Local Interpretable Model-agnostic Explanations）屬於哪一類解釋技術？", "options": {"A": "內建可解釋模型（Intrinsic Interpretability）：模型本身具有透明的決策結構", "B": "對話式解釋系統（Conversational AI Explainer）：透過互動對話提供模型解釋", "C": "後處理模型解釋（post-hoc）：對已訓練模型提供外部解釋", "D": "代理模型技術（Surrogate Model）：訓練另一個簡單模型來完全取代原黑盒模型進行推論"}, "topic": "AI治理、法規與倫理"}, {"batch": "115年第一次", "batchCode": "115T1", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "C", "number": 27, "id": "115T1-S1-27", "question": "SHAP（SHapley Additive exPlanations）值常用於分析機器學習模型的輸出行為。 下列何者最符合SHAP 值所提供的資訊？", "options": {"A": "模型在訓練過程中，各特徵對損失函數收斂速度的影響程度", "B": "依據特徵對模型整體準確率的影響，自動篩除低重要性變數", "C": "在單一預測結果中，各輸入特徵對最終輸出所產生的貢獻分配", "D": "透過調整特徵權重，使模型在推論階段降低計算複雜度"}, "topic": "機器學習模型與學習類型"}, {"batch": "115年第一次", "batchCode": "115T1", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "C", "number": 28, "id": "115T1-S1-28", "question": "在金融業導入AI 模型與可解釋性技術時，反事實解釋（Counterfactual Explanation）最符合下列哪一種應用？", "options": {"A": "分析整體客戶群的信用風險分布，以預測未來違約率趨勢", "B": "回溯歷史呆帳案例，辨識造成違約的主要影響因素", "C": "分析在模型不變的前提下，客戶申請資料變動對授信決策結果的影響", "D": "依據客戶輪廓與行為資料，推薦最適合的金融商品以提升交叉銷售"}, "topic": "AI治理、法規與倫理"}, {"batch": "115年第一次", "batchCode": "115T1", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "B", "number": 29, "id": "115T1-S1-29", "question": "在深度學習模型的分析與驗證過程中，研究人員有時會利用「顯著性圖（Saliency Map）」來輔助理解模型行為。下列何者最符合此技術的主要用途？", "options": {"A": "量化各輸入特徵對模型整體預測準確度的平均影響程度", "B": "標示輸入資料中對單一預測結果影響較大的區域或部分", "C": "評估在不同模型參數設定下，預測結果的穩定性變化", "D": "比較不同模型架構在測試資料上的泛化能力差異"}, "topic": "機器學習模型與學習類型"}, {"batch": "115年第一次", "batchCode": "115T1", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "A", "number": 30, "id": "115T1-S1-30", "question": "某商業銀行想建立洗錢行為檢測系統，擁有過去5 年的交易記錄，其中包含已確認的洗錢案例（標記為「異常」）和正常交易（標記為「正常」）。銀行希望系統能自動識別新交易是否為洗錢行為，請問使用下列哪一種機器學習方法最為適合？", "options": {"A": "監督式學習的分類問題", "B": "非監督式學習的分群問題", "C": "強化式學習", "D": "非監督式學習的關聯規則挖掘"}, "topic": "機器學習模型與學習類型"}, {"batch": "115年第一次", "batchCode": "115T1", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "A", "number": 31, "id": "115T1-S1-31", "question": "某農場收集了大量作物葉片影像，但只有30%的影像有病害類別標註，其餘70% 的影像沒有任何標籤。農場希望充分利用所有資料來訓練病害識別模型。這種情況最適合使用哪一種學習方法？", "options": {"A": "半監督式學習（Semi-supervised Learning）", "B": "監督式學習（Supervised Learning）", "C": "非監督式學習（Unsupervised Learning）", "D": "強化式學習（Reinforcement Learning）"}, "topic": "機器學習模型與學習類型"}, {"batch": "115年第一次", "batchCode": "115T1", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "C", "number": 32, "id": "115T1-S1-32", "question": "某環保局想建立AI 系統監測空氣品質，透過分析監測站攝影機拍攝的影像來識別煙霧。系統需要在影像中找出煙霧區域並標示其位置和範圍。這個應用主要屬於電腦視覺的哪個技術領域？", "options": {"A": "影像分類，判斷影像中是否有煙霧", "B": "物件偵測，找出煙霧位置並用方框標示", "C": "影像分割，精確標示出煙霧的像素區域", "D": "人臉辨識，識別煙霧來源"}, "topic": "AI應用情境與基本概念"}, {"batch": "115年第一次", "batchCode": "115T1", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "D", "number": 33, "id": "115T1-S1-33", "question": "某公車系統想預測各站點的到站時間，需要考慮歷史班次資料、即時路況、天氣等因素。由於路況變化複雜，傳統循環神經網路（Recurrent Neural Network, RNN）在建模時可能難以保留較早期的重要資訊。下列哪種架構最能解決這個問題？", "options": {"A": "卷積神經網路（Convolutional Neural Network, CNN），利用卷積層捕捉局部特徵", "B": "自編碼器（Autoencoder, AE），先進行資料壓縮再重建", "C": "全連接神經網路（Fully Connected Neural Network, FCNN），增加隱藏層數量", "D": "長短期記憶網路（Long Short-Term Memory, LSTM），改善RNN 的長期記憶問題"}, "topic": "機器學習模型與學習類型"}, {"batch": "115年第一次", "batchCode": "115T1", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "C", "number": 34, "id": "115T1-S1-34", "question": "某保險公司每月處理約50 萬筆理賠申請，希望建立AI 系統自動識別可疑的詐欺案件。由於公司內部缺乏AI 專業人員，且需要快速上線驗證效果，IT 資訊主管正在評估不同的AI 平台解決方案。在去識別化個人隱私資料後，下列哪一種平台類型最適合該公司的需求？", "options": {"A": "從零開始建立深度學習框架並自行訓練模型", "B": "採用開源機器學習框架進行客製化模型開發", "C": "使用雲端AutoML 平台進行自動化模型訓練", "D": "購買現成的詐欺偵測軟體套件直接部署"}, "topic": "AI治理、法規與倫理"}, {"batch": "115年第一次", "batchCode": "115T1", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "C", "number": 35, "id": "115T1-S1-35", "question": "某市政府規劃釋出市民用電資料供學術研究使用，資料內容包含用電紀錄與部分人口統計欄位。考量資料可能涉及可識別個人之資訊，且須符合個人資料保護相關規範，下列哪一種資料處理方式最為適當？", "options": {"A": "提供完整資料集並透過合約約定研究用途與保密責任", "B": "僅保留用電數值資料，移除所有其他欄位以避免識別風險", "C": "對具識別風險的資料欄位進行轉換處理，並移除直接識別資訊", "D": "僅將資料加密後提供，確保資料在傳輸過程中的安全性"}, "topic": "AI治理、法規與倫理"}, {"batch": "115年第一次", "batchCode": "115T1", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "A", "number": 36, "id": "115T1-S1-36", "question": "某電子製造公司建置AI 視覺檢測系統，用於辨識PCB 電路板製程缺陷。系統在影像判讀任務上表現穩定，但其模型設計與訓練目標皆侷限於特定應用範圍，無法直接遷移至其他營運決策任務。依人工智慧能力範疇分類，下列何者最符合該系統特性？", "options": {"A": "弱AI（Weak AI/Narrow AI）", "B": "強AI（Strong AI）", "C": "通用人工智慧（Artificial General Intelligence, AGI）", "D": "超級人工智慧（Artificial Superintelligence, ASI）"}, "topic": "機器學習模型與學習類型"}, {"batch": "115年第一次", "batchCode": "115T1", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "B", "number": 37, "id": "115T1-S1-37", "question": "某紡織製造公司導入AI 系統進行布料瑕疵檢測，每天需處理來自30 條產線的影像資料，包括高解析度照片、感測器數值、生產參數記錄等多種格式。該公司收集的資料量從每日2GB 增長至50GB，且需在布料離開產線前的3 秒內完成瑕疵判定。近期團隊發現系統在尖峰時段容易出現判定延遲，影響製程節奏。若要優先改善此問題，下列哪一種做法最適合？", "options": {"A": "擴充資料儲存容量，以因應長期資料累積需求", "B": "強化即時資料處理與推論計算資源配置，以降低延遲風險", "C": "調整資料格式標準，以降低跨來源整合複雜度", "D": "增加資料驗證與清理機制，以提升資料品質穩定性"}, "topic": "機器學習模型與學習類型"}, {"batch": "115年第一次", "batchCode": "115T1", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "B", "number": 38, "id": "115T1-S1-38", "question": "某果園管理公司計畫導入AI 系統協助農民判斷蘋果成熟度，透過分析果實特徵資訊，評估成熟狀態並自動判斷採收時機。根據AI 應用領域的分類，這個系統主要屬於哪一個應用領域？", "options": {"A": "自然語言處理（Natural Language Processing）", "B": "電腦視覺（Computer Vision）", "C": "語音識別（Speech Recognition）", "D": "推薦系統（Recommendation System）"}, "topic": "資料處理、特徵工程與資料品質"}, {"batch": "115年第一次", "batchCode": "115T1", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "D", "number": 39, "id": "115T1-S1-39", "question": "某企業評估於不同業務場景導入機器學習技術。下列哪一項應用情境與機器學習類型的搭配最為適當？", "options": {"A": "在醫療影像分析中，同時運用少量已標註資料與大量未標註影像進行模型訓練 —監督式學習（Supervised Learning）", "B": "在智慧推薦系統中，利用顧客是否點擊的歷史標籤資料預測未來偏好—非監督式學習（Unsupervised Learning）", "C": "在詐欺交易分析中，模型透過錯誤判斷所產生的損失作為回饋訊號，持續調整策略—監督式學習（Supervised Learning）", "D": "在股價資料分析中，將歷史價格變動模式劃分為若干趨勢型態，且未使用人工標註—非監督式學習（Unsupervised Learning）"}, "topic": "機器學習模型與學習類型"}, {"batch": "115年第一次", "batchCode": "115T1", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "A", "number": 40, "id": "115T1-S1-40", "question": "某製造業公司建置機器學習模型，用於預測產品是否為瑕疵品。實際生產資料中，瑕疵品比例極低，大多數樣本皆為正常品。模型測試時發現，即使模型多數預測為正常品，仍可獲得很高的整體準確率。在此情境下，若希望更有效衡量模型對瑕疵品的辨識能力，下列何者較適合作為主要評估指標？", "options": {"A": "F1-score", "B": "均方誤差（Root Mean Squared Error, RMSE）", "C": "準確率（Accuracy）", "D": "判定係數（R², Coefficient of Determination）"}, "topic": "資料分析、視覺化與評估指標"}, {"batch": "115年第一次", "batchCode": "115T1", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "B", "number": 41, "id": "115T1-S1-41", "question": "在大型語言模型（LLM）的效能優化中，Flash Attention 常被用來改善Transformer 注意力機制的運算效率。關於Flash Attention 的主要效益，下列敘述何者最正確？", "options": {"A": "透過忽略影響較小的注意力權重，減少模型需要計算的關聯數量，以降低運算成本", "B": "透過調整注意力計算與資料處理方式，減少中間結果的儲存需求，進而改善速度與資源使用效率", "C": "透過增加注意力計算的並行程度，使模型可同時處理更多注意力頭部", "D": "透過將注意力結果暫存於高速快取記憶體，以避免重複計算造成延遲"}, "topic": "生成式AI與LLM應用"}, {"batch": "115年第一次", "batchCode": "115T1", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "D", "number": 42, "id": "115T1-S1-42", "question": "某企業建置基於檢索增強生成（RAG）的法遵知識輔助系統，用於整合法規條文、內控制度與歷史函釋文件。系統運行後發現，每當法規更新或新增解釋文件時，需重新建立完整索引，導致更新期間系統暫停服務，且部分回應偶有引用舊版內容的情形。若希望在兼顧查詢效率的同時提升知識更新彈性與系統穩定性， 下列何者最適合？", "options": {"A": "提升模型推論資源配置，以維持高流量查詢時的回應效能", "B": "調整語言模型的輸出限制機制，以降低生成內容與法規不一致的風險", "C": "建立固定法規問答對照表，以規則化方式優先回應常見問題", "D": "導入可支援增量更新的索引管理方式，使異動文件可即時反映於檢索結果"}, "topic": "AI治理、法規與倫理"}, {"batch": "115年第一次", "batchCode": "115T1", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "D", "number": 43, "id": "115T1-S1-43", "question": "關於機器學習不同的學習模式，下列敘述何者錯誤？ 1. 監督式學習（Supervised Learning）透過已標註資料學習輸入與目標之間的對應關係，常見任務包含分類與數值預測。 2. 非監督式學習（Unsupervised Learning）雖不需標註資料，但通常需預先定義每筆資料的正確輸出類別以利模型收斂。 3. 半監督式學習（Semi-supervised Learning）在訓練過程中僅利用未標註資料進行特徵學習，並不涉及標註資料。 4. 自監督式學習（Self-supervised Learning）的訓練方式與監督式學習相同，皆需人工逐筆提供標註資料。 5. 強化式學習（Reinforcement Learning）透過與環境互動並依據回饋訊號調整策略，以優化決策行為。 6. 自監督式學習（Self-supervised Learning）通常利用資料本身產生訓練目標，以降低對人工標註資料的依賴。", "options": {"A": "2、3、6", "B": "2、4、5", "C": "1、3、6", "D": "2、3、4"}, "topic": "機器學習模型與學習類型"}, {"batch": "115年第一次", "batchCode": "115T1", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "A", "number": 44, "id": "115T1-S1-44", "question": "某零售業者建立顧客行為預測模型，資料集中包含「年消費金額」、「平均單筆交易金額」及「會員年資」等數值型特徵。資料分析顯示，部分金額特徵呈現高度偏態分布，少數樣本的數值顯著高於多數觀測值。為降低極端值對模型學習穩定性的影響，下列哪一種特徵工程方法最適合？", "options": {"A": "對數轉換（Log Transformation）", "B": "區間化（Binning）", "C": "One-hot 編碼（One-hot Encoding）", "D": "隨機重抽樣（Random Resampling）"}, "topic": "資料處理、特徵工程與資料品質"}, {"batch": "115年第一次", "batchCode": "115T1", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "C", "number": 45, "id": "115T1-S1-45", "question": "某團隊訓練深層神經網路模型時，發現訓練誤差長時間幾乎未下降，模型參數更新幅度極小，呈現學習停滯現象。若研判問題與梯度傳遞效率有關，下列何者最適合的改善策略？", "options": {"A": "延長模型訓練時間，使模型有更多機會調整參數", "B": "增加訓練樣本數量，以提升模型學習能力", "C": "調整模型中的啟動函數設定，以改善訓練過程的穩定性", "D": "簡化模型結構，以降低模型過度擬合的可能性"}, "topic": "機器學習模型與學習類型"}, {"batch": "115年第一次", "batchCode": "115T1", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "C", "number": 46, "id": "115T1-S1-46", "question": "某市政府建置城市治理資料平台，需整合交通車流偵測資料、路口監視器影像， 以及民眾透過陳情系統提交的文字通報。由於各類資料格式、儲存方式與資料型態差異甚大，導致資料清理與整合成本顯著增加。就大數據特性而言，此專案最主要面臨下列哪一項挑戰？", "options": {"A": "Volume", "B": "Velocity", "C": "Variety", "D": "Veracity"}, "topic": "AI治理、法規與倫理"}, {"batch": "115年第一次", "batchCode": "115T1", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "D", "number": 47, "id": "115T1-S1-47", "question": "某企業規劃導入AI 技術支援多項資料分析任務中，下列何種屬於結構化預測 （Structured Prediction）問題？", "options": {"A": "判斷一封電子郵件是否為垃圾郵件", "B": "預測未來一週的產品需求量", "C": "預測客戶是否可能流失", "D": "為語音內容轉換後的文字進行逐詞標註"}, "topic": "AI應用情境與基本概念"}, {"batch": "115年第一次", "batchCode": "115T1", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "C", "number": 48, "id": "115T1-S1-48", "question": "某物流公司想導入AI 以提升營運效率，評估不同資料型態與模型架構。下列哪一種應用情境最適合採用卷積神經網路（Convolutional Neural Network, CNN）作為主要模型架構？", "options": {"A": "依據包裹每日掃描紀錄的時間序列，預測下週各倉庫的進貨量波動", "B": "根據客服對話逐句內容的先後順序，判斷客訴是否可能升級為申訴案件", "C": "根據倉庫監視器影像，自動辨識貨架是否缺貨並標示缺貨區域位置", "D": "依據車隊GPS 路徑點的連續軌跡，預測下一段可能行駛路線"}, "topic": "AI治理、法規與倫理"}, {"batch": "115年第一次", "batchCode": "115T1", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "D", "number": 49, "id": "115T1-S1-49", "question": "某AI 科技公司在工業缺陷檢測領域已有成熟的辨識產品經驗。現欲與新客戶合作開發一項類似產品的表面瑕疵檢測系統，但因新產品量產不久，標註樣本極為稀少且專家標註成本高昂。在不大幅增加標註預算的前提下，下列哪一種做法最能利用該公司既有的技術優勢來提升模型表現？", "options": {"A": "增加模型參數規模，使模型具備更強表達能力", "B": "透過資料增強（Data Augmentation）擴展影像變化，以提升模型穩定性", "C": "重新蒐集大量影像並進行完整人工標註", "D": "採用遷移學習（Transfer Learning），利用既有預訓練模型進行調整"}, "topic": "機器學習模型與學習類型"}, {"batch": "115年第一次", "batchCode": "115T1", "subject": "第一科：人工智慧基礎概論", "subjectCode": "S1", "answer": "B", "number": 50, "id": "115T1-S1-50", "question": "某醫院使用機器學習模型篩檢癌症患者。模型預測結果會決定哪些病人需要進一步檢查。院方非常重視盡量找出所有可能的癌症患者，即希望降低漏診（Missed Diagnosis）風險，即便這可能增加一些誤判。下列哪一個評估指標最能反映模型找出癌症患者的能力？", "options": {"A": "精準率（Precision）", "B": "召回率（Recall）", "C": "假陽性率（False Positive Rate）", "D": "ROC-AUC 曲線"}, "topic": "資料分析、視覺化與評估指標"}, {"batch": "115年第一次", "batchCode": "115T1", "subject": "第二科：生成式AI應用與規劃", "subjectCode": "S2", "answer": "A", "number": 1, "id": "115T1-S2-01", "question": "某零售企業導入生成式AI 商品推薦系統。測試結果顯示，在購物行為、偏好設定與價格區間相同的情況下，不同客戶族群收到的推薦商品類型仍出現明顯差異， 且差異方向不易以既有行銷策略解釋。若在模型架構與推論設定皆未調整情形下，專案目標是優先降低可能的模型偏差風險，下列何者最合理？", "options": {"A": "重新檢視訓練資料的樣本分布與代表性", "B": "限制推薦結果僅顯示高銷量商品", "C": "降低模型參數規模以簡化決策邏輯", "D": "提高推薦結果的隨機性以增加多樣性"}, "topic": "AI治理、法規與倫理"}, {"batch": "115年第一次", "batchCode": "115T1", "subject": "第二科：生成式AI應用與規劃", "subjectCode": "S2", "answer": "D", "number": 2, "id": "115T1-S2-02", "question": "在進行大型語言模型 (LLM) 企業專屬知識的Fine-tuning 時，若內部GPU 運算資源與記憶體嚴重受限，下列哪一種參數高效微調（PEFT, Parameter Efficient Fine- Tuning）技術最能在維持模型效能的前提下，顯著降低需更新的參數數量？", "options": {"A": "知識蒸餾（Knowledge Distillation）", "B": "提示詞工程（Prompt Engineering）", "C": "梯度凍結（Gradient Freezing）", "D": "低秩適配（Low-Rank Adaptation）"}, "topic": "生成式AI與LLM應用"}, {"batch": "115年第一次", "batchCode": "115T1", "subject": "第二科：生
